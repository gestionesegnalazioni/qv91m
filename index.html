<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="app-version" content="8.17">
<title>Gestione Bus v8.17</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --visual-viewport-top:0px;
    --bg:#080b12;
    --panel:#101623;
    --card:#182030;
    --border:rgba(255,255,255,.12);
    --text:#f4f7fb;
    --muted:#9aa4b2;
    --green:#34d399;
    --red:#ef4444;
    --accent:#f5c84b;
    --blue:#93c5fd;
    --font-mono:'DM Sans',Arial,sans-serif;
    --font-sans:'DM Sans',sans-serif;
  }

  * {
    box-sizing:border-box;
    margin:0;
    padding:0;
    max-width:100%;
  }

  body {
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-sans);
    min-height:100vh;
    overflow-x:hidden;
  }

  html.home-scroll-locked,
  body.home-scroll-locked {
    height:100%;
    overflow:hidden;
    overscroll-behavior:none;
  }

  body.home-scroll-locked {
    position:fixed;
    inset:0;
    width:100%;
  }

  body.home-scroll-locked .wrapper {
    padding-bottom:0;
  }

  .wrapper {
    width:100%;
    max-width:720px;
    margin:0 auto;
    padding:20px 16px 260px;
  }

  .bus-tile,
  .bus-detail,
  .modal,
  .add-bus-form,
  .seg-card {
    background:linear-gradient(145deg,rgba(255,255,255,.08),rgba(255,255,255,.035));
    border:1px solid var(--border);
    box-shadow:0 14px 40px rgba(0,0,0,.24);
    backdrop-filter:blur(16px);
  }

  button {
    font-family:var(--font-mono);
    cursor:pointer;
    border:none;
  }

  .home-bottom-actions {
    margin-top:24px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .btn-primary {
    background:var(--green);
    color:#000;
    border-radius:999px;
    padding:11px 18px;
    font-weight:700;
    font-size:.82rem;
    min-height:40px;
  }

  .btn-yellow-main {
    background:linear-gradient(135deg,#facc15,#eab308);
    color:#000000;
    border:1px solid #facc15;
    border-radius:999px;
    padding:11px 18px;
    font-weight:700;
    font-size:.82rem;
    min-height:40px;
    width:100%;
    box-shadow:0 10px 24px rgba(212,138,163,.22);
  }

  .btn-service-main {
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:#ffffff;
    border:1px solid #2563eb;
    border-radius:999px;
    padding:11px 18px;
    font-weight:700;
    font-size:.82rem;
    min-height:40px;
    width:100%;
    box-shadow:0 10px 24px rgba(37,99,235,.20);
  }

  .btn-service-main.in-service {
    color:#000;
    background:var(--green);
    border-color:var(--green);
  }

  .btn-share-main {
    background:#D48AA3;
    color:#ffffff;
    border:1px solid #D48AA3;
    border-radius:999px;
    padding:11px 18px;
    font-weight:700;
    font-size:.82rem;
    min-height:40px;
    width:100%;
    box-shadow:0 10px 24px rgba(212,138,163,.22);
  }

  .btn-share-main:active {
    transform:scale(.985);
  }

  .btn-delete-bus {
    background:linear-gradient(135deg,#ef4444,#b91c1c);
    color:#ffffff;
    border:1px solid #dc2626;
    border-radius:999px;
    padding:11px 18px;
    font-weight:700;
    font-size:.82rem;
    min-height:40px;
    width:100%;
    box-shadow:0 10px 24px rgba(220,38,38,.20);
  }

  .btn-delete-bus:active {
    transform:scale(.985);
  }

  .recent-list {
    display:flex;
    flex-direction:column;
    gap:9px;
    margin:12px 0 4px;
    max-height:58vh;
    overflow:auto;
  }

  .recent-item {
    border:1px solid rgba(255,255,255,.12);
    border-radius:14px;
    background:rgba(255,255,255,.05);
    padding:11px 12px;
  }

  .recent-item-top {
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin-bottom:5px;
  }

  .recent-bus {
    color:var(--green);
    font-weight:800;
    font-size:.92rem;
  }

  .recent-date {
    color:var(--muted);
    font-size:.68rem;
    white-space:nowrap;
  }

  .recent-action {
    color:var(--text);
    font-size:.84rem;
    line-height:1.35;
  }

  .recent-detail {
    color:var(--muted);
    font-size:.75rem;
    line-height:1.3;
    margin-top:3px;
    word-break:break-word;
  }

  .share-list {
    display:flex;
    flex-direction:column;
    gap:8px;
    margin:10px 0 14px;
    max-height:52vh;
    overflow:auto;
    padding-right:2px;
  }

  .share-item {
    display:flex;
    align-items:flex-start;
    gap:10px;
    padding:10px;
    border:1px solid rgba(255,255,255,.12);
    border-radius:12px;
    background:rgba(255,255,255,.04);
    color:var(--text);
    font-size:.88rem;
    line-height:1.35;
  }

  .share-item input {
    width:18px;
    height:18px;
    flex:0 0 18px;
    margin-top:2px;
  }

  .share-actions-row {
    display:flex;
    gap:8px;
    justify-content:flex-end;
    flex-wrap:wrap;
    margin-bottom:8px;
  }

  .btn-ghost,
  .btn-blue {
    background:transparent;
    border:1px solid var(--border);
    border-radius:999px;
    padding:0 14px;
    height:38px;
    min-width:136px;
    font-size:.76rem;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    white-space:nowrap;
  }

  .btn-ghost {
    color:#22c55e;
  }

  .btn-blue {
    color:var(--blue);
    border-color:rgba(59,130,246,.55);
  }

  .btn-blue.in-service {
    color:#86efac;
    border-color:rgba(34,197,94,.52);
  }

  .btn-ghost:hover {
    color:var(--text);
    border-color:rgba(255,255,255,.28);
  }

  .btn-back-round {
    width:40px;
    height:40px;
    min-width:40px;
    border-radius:50%;
    background:transparent;
    color:var(--muted);
    border:1px solid rgba(255,255,255,.18);
    font-size:1.15rem;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:0;
    line-height:1;
  }

  .btn-back-round:hover,
  .btn-back-round:active {
    background:rgba(255,255,255,.06);
    border-color:rgba(255,255,255,.28);
    color:var(--text);
  }

  .add-bus-form {
    display:none;
    border-radius:18px;
    padding:14px;
    margin-top:10px;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
  }

  .add-bus-form.open {
    display:flex;
  }

  input,
  textarea {
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.18);
    border-radius:14px;
    color:var(--text);
    outline:none;
    font-family:var(--font-sans);
  }

  input:focus,
  textarea:focus {
    border-color:rgba(245,200,75,.65);
  }

  .bus-input {
    padding:11px 14px;
    font-family:var(--font-mono);
    width:190px;
    text-transform:uppercase;
  }

  .bus-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(132px,1fr));
    gap:12px;
  }

  .bus-grid-section {
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:12px;
    grid-column:1/-1;
    width:100%;
  }

  .bus-section-title {
    font-family:var(--font-mono);
    font-size:.74rem;
    color:var(--muted);
    letter-spacing:1.6px;
    text-transform:uppercase;
    margin:24px 0 12px;
    grid-column:1/-1;
    text-align:center;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
  }

  .bus-section-title::before,
  .bus-section-title::after {
    content:'';
    height:1px;
    flex:1;
    max-width:72px;
    background:rgba(255,255,255,.12);
  }

  .bus-section-title:first-child {
    margin-top:0;
  }

  .bus-section-title.urbani-title {
    color:#e5e7eb;
  }

  .bus-section-title.urbani-title::before,
  .bus-section-title.urbani-title::after {
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.55));
  }

  .bus-section-title.extra-title {
    color:#93c5fd;
  }

  .bus-section-title.extra-title::before,
  .bus-section-title.extra-title::after {
    background:linear-gradient(90deg,transparent,rgba(59,130,246,.78));
  }

  .bus-section-title.fuori-title {
    color:#fca5a5;
  }

  .bus-section-title.fuori-title::before,
  .bus-section-title.fuori-title::after {
    background:linear-gradient(90deg,transparent,rgba(239,68,68,.78));
  }

  .bus-tile {
    border-radius:24px;
    min-height:116px;
    padding:17px 16px 14px;
    position:relative;
    overflow:hidden;
    text-align:left;
    border:1px solid rgba(255,255,255,.16)!important;
    background:
      linear-gradient(145deg,rgba(255,255,255,.12),rgba(255,255,255,.035) 58%,rgba(255,255,255,.018));
    box-shadow:
      0 18px 46px rgba(0,0,0,.28),
      inset 0 1px 0 rgba(255,255,255,.13),
      inset 0 -1px 0 rgba(255,255,255,.025);
    backdrop-filter:blur(20px) saturate(145%);
    -webkit-backdrop-filter:blur(20px) saturate(145%);
    transition:transform .16s ease, border-color .16s ease, background .16s ease;
  }

  .bus-tile::before {
    content:'';
    position:absolute;
    inset:0;
    pointer-events:none;
    background:
      radial-gradient(circle at 18% 0%,rgba(255,255,255,.16),transparent 36%),
      linear-gradient(180deg,rgba(255,255,255,.055),transparent 42%);
    opacity:.72;
  }

  .bus-tile > * {
    position:relative;
    z-index:1;
  }

  .bus-tile:active {
    transform:scale(.975);
    background:linear-gradient(145deg,rgba(255,255,255,.095),rgba(255,255,255,.035));
  }

  .bus-card-top {
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }

  .bus-number {
    font-family:var(--font-mono);
    font-size:1.18rem;
    font-weight:700;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    color:var(--text)!important;
  }

  .bus-icon {
    width:27px;
    height:27px;
    flex:0 0 27px;
    color:rgba(255,255,255,.72);
    filter:drop-shadow(0 4px 10px rgba(0,0,0,.20));
  }

  .bus-card-line {
    height:1px;
    background:linear-gradient(90deg,rgba(255,255,255,.06),rgba(255,255,255,.22),rgba(255,255,255,.06));
    margin:13px 0 10px;
    width:100%;
  }

  .bus-count {
    font-family:var(--font-mono);
    font-size:.72rem;
    color:var(--muted);
    font-weight:500;
  }

  .bus-count.active {
    color:var(--red);
    font-weight:700;
  }

  .bus-count.zero {
    color:var(--muted);
    font-weight:500;
  }

  .bus-tile.urbano {
    border-color:rgba(255,255,255,.23)!important;
    box-shadow:
      0 15px 38px rgba(0,0,0,.27),
      inset 3px 0 0 rgba(255,255,255,.75),
      inset 0 1px 0 rgba(255,255,255,.12)!important;
  }

  .bus-tile.urbano .bus-icon {
    color:rgba(255,255,255,.88);
  }

  .bus-tile.extraurbano {
    border-color:rgba(59,130,246,.48)!important;
    background:
      linear-gradient(145deg,rgba(59,130,246,.15),rgba(255,255,255,.035) 58%,rgba(37,99,235,.04));
    box-shadow:
      0 15px 38px rgba(30,64,175,.15),
      inset 3px 0 0 rgba(59,130,246,.94),
      inset 0 1px 0 rgba(255,255,255,.10)!important;
  }

  .bus-tile.extraurbano .bus-icon {
    color:#93c5fd;
  }

  .bus-tile.fuori-servizio {
    border-color:rgba(239,68,68,.52)!important;
    background:
      linear-gradient(145deg,rgba(239,68,68,.14),rgba(255,255,255,.03) 58%,rgba(127,29,29,.04));
    box-shadow:
      0 15px 38px rgba(185,28,28,.14),
      inset 3px 0 0 rgba(239,68,68,.95),
      inset 0 1px 0 rgba(255,255,255,.08)!important;
  }

  .bus-tile.fuori-servizio .bus-icon {
    color:#fca5a5;
  }

  .bus-fuori-label {
    font-family:var(--font-mono);
    font-size:.68rem;
    color:var(--blue);
    margin-top:6px;
  }

  .bus-detail {
    display:none;
    background:transparent!important;
    border:none!important;
    box-shadow:none!important;
    backdrop-filter:none!important;
    padding:0!important;
  }

  .bus-detail.open {
    display:flex;
    flex-direction:column;
    min-height:calc(100dvh - 86px);
    padding-bottom:22vh!important;
  }

  .bus-detail.swiping {
    transition:none!important;
    will-change:transform, opacity;
  }

  .bus-detail.swipe-back {
    transition:transform .18s ease, opacity .18s ease;
  }

  .bus-detail {
    transform:translateX(0);
    opacity:1;
    width:100%;
    margin-left:auto;
    margin-right:auto;
  }

  .detail-top {
    display:none;
  }

  .detail-num {
    font-family:var(--font-mono);
    font-size:1.65rem;
    color:var(--green);
    font-weight:700;
    letter-spacing:1px;
    min-height:64px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:6px 0 18px;
    text-align:center;
  }

  .seg-list {
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .seg-card {
    border-radius:18px;
    padding:12px;
  }

  .seg-card.pregressa {
    border-color:rgba(245,200,75,.38);
    opacity:.94;
  }

  details summary {
    list-style:none;
    cursor:pointer;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
  }

  details summary::-webkit-details-marker {
    display:none;
  }

  .seg-title-wrap {
    display:flex;
    gap:10px;
    align-items:flex-start;
    min-width:0;
    flex:1;
  }

  .seg-dot {
    width:7px;
    height:7px;
    border-radius:50%;
    background:var(--muted);
    flex:0 0 7px;
    margin-top:7px;
  }

  .seg-desc {
    font-size:.95rem;
    line-height:1.35;
    word-break:break-word;
  }

  .seg-title-text {
    display:flex;
    flex-direction:column;
    gap:3px;
    min-width:0;
  }

  .seg-count-preview {
    font-family:var(--font-mono);
    font-size:.70rem;
    color:var(--muted);
    line-height:1.2;
  }

  .seg-count-preview strong {
    color:#ffffff;
    font-size:.84rem;
    font-weight:800;
  }

  .chev {
    color:var(--muted);
    border:1px solid rgba(255,255,255,.14);
    border-radius:999px;
    width:28px;
    height:24px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:.78rem;
    flex:0 0 28px;
  }

  details[open] .chev .closed {
    display:none;
  }

  details:not([open]) .chev .open {
    display:none;
  }

  .seg-body {
    margin-top:10px;
  }

  .date-info {
    font-family:var(--font-mono);
    font-size:.75rem;
    color:var(--muted);
    margin-bottom:8px;
  }

  .date-columns {
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:8px;
    margin-bottom:10px;
    width:100%;
  }

  .date-columns-single {
    grid-template-columns:repeat(2,minmax(0,1fr));
  }

  .date-column {
    display:flex;
    flex-direction:column;
    gap:5px;
    min-width:0;
  }

  .date-tag {
    display:grid;
    grid-template-columns:minmax(0,1fr) 22px;
    align-items:center;
    gap:6px;
    background:rgba(255,255,255,.05);
    border:1px solid var(--green);
    border-radius:8px;
    padding:5px 6px 5px 7px;
    font-family:var(--font-mono);
    font-size:.70rem;
    color:var(--muted);
    min-width:0;
    width:100%;
  }

  .date-main {
    display:inline-flex;
    align-items:center;
    gap:4px;
    min-width:0;
    white-space:nowrap;
    overflow:visible;
  }

  .date-num {
    color:rgba(255,255,255,.72);
    font-weight:700;
    min-width:20px;
    text-align:right;
    flex:0 0 20px;
  }

  .date-value {
    white-space:nowrap;
  }

  .date-x {
    cursor:pointer;
    width:22px;
    height:20px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    justify-self:end;
    padding:0;
    flex:0 0 22px;
    font-size:.72rem;
    line-height:1;
  }

  .date-x:hover {
    color:var(--red);
  }

  .date-add-row {
    display:flex;
    align-items:center;
    margin-top:6px;
    width:100%;
  }

  .date-add-wrap {
    margin-top:6px;
  }

  .today-inline {
    display:none;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    font-family:var(--font-mono);
    font-size:.72rem;
    font-weight:700;
    color:#22c55e;
    margin:0 0 9px;
    text-align:center;
    white-space:nowrap;
  }

  .today-inline.visible {
    display:flex;
  }

  .today-arrow {
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:28px;
    min-width:28px;
    height:22px;
    font-size:1.15rem;
    line-height:1;
    color:#22c55e;
    font-family:Arial, Helvetica, sans-serif;
    font-weight:700;
  }

  .today-text {
    display:inline-block;
    color:#22c55e;
  }

  .date-plus {
    color:#22c55e;
    font-family:var(--font-mono);
    font-size:1.15rem;
    font-weight:700;
    line-height:1;
    pointer-events:none;
    user-select:none;
    width:24px;
    min-width:24px;
    text-align:center;
  }

  .date-input {
    flex:1;
    width:100%;
    min-width:0;
    padding:12px 16px;
    text-align:center;
    font-family:var(--font-mono);
    font-size:.82rem;
    color:var(--green);
    background:rgba(52,211,153,.05);
    border:1.5px solid var(--green);
    border-radius:16px;
    outline:none;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.035);
  }

  .date-input::placeholder {
    color:rgba(52,211,153,.72);
    opacity:1;
    text-align:center;
  }

  .date-input:focus {
    border-color:var(--green);
    box-shadow:0 0 0 2px rgba(52,211,153,.14);
    background:rgba(52,211,153,.07);
  }

  .seg-actions {
    display:flex;
    gap:6px;
    flex-wrap:nowrap;
    margin-top:10px;
    padding-top:9px;
    border-top:1px solid rgba(255,255,255,.08);
    justify-content:center;
    align-items:center;
    overflow:hidden;
  }

  .small-action {
    background:transparent;
    color:var(--muted);
    border:1px solid rgba(255,255,255,.14);
    border-radius:999px;
    min-width:28px;
    height:26px;
    padding:0 8px;
    font-size:.66rem;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    white-space:nowrap;
    flex:0 0 auto;
  }

  .small-action.archive {
    color:var(--accent);
    border-color:rgba(245,200,75,.42);
  }

  .small-action.restore {
    color:#86efac;
    border-color:rgba(34,197,94,.42);
  }

  .small-action.icon {
    color:var(--muted);
    width:28px;
    min-width:28px;
    padding:0;
    font-size:.78rem;
  }

  .small-action.notes {
    color:var(--muted);
    border-color:rgba(255,255,255,.14);
  }

  .small-action.notes.has-note {
    color:var(--blue);
    border-color:rgba(59,130,246,.45);
  }

  .notes-box {
    display:none;
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid rgba(255,255,255,.08);
  }

  .notes-box.open {
    display:block;
  }

  .notes-label {
    font-family:var(--font-mono);
    color:var(--muted);
    font-size:.7rem;
    margin-bottom:6px;
    text-transform:uppercase;
    letter-spacing:.5px;
  }

  .notes-textarea {
    width:100%;
    min-height:96px;

  return String(a.matricola || '').localeCompare(String(b.matricola || ''), 'it', { numeric:true });

  const ao = typeof a.order === 'number' ? a.order : 999999;

}

}

async function registraModifica(bus, azione, dettaglio = '') {
  if (!bus || !azione) return;
  try {
    await addDoc(collection(db, 'modifiche'), {
      bus:String(bus).toUpperCase(),
      azione,
      dettaglio:String(dettaglio || '').trim(),
      createdAt:new Date().toISOString()
    });
  } catch(e) {
    console.error('Cronologia non registrata', e);
  }
}

function formattaDataModifica(value) {
  const data = new Date(value);
  if (Number.isNaN(data.getTime())) return '';
  return data.toLocaleString('it-IT', {
    day:'2-digit',
    month:'2-digit',
    year:'2-digit',
    hour:'2-digit',
    minute:'2-digit'
  });
}

          '</div>' +
          '<div class="recent-action">' + esc(m.azione || 'Modifica') + '</div>' +
          dettaglio +
        '</div>';
      }).join('')
    : '<div class="empty">La cronologia è vuota. Le nuove modifiche compariranno qui.</div>';
}

function getBusGroups() {
  const inServizio = buses.filter(b => !b.fuoriServizio);

  const urbani = inServizio.filter(b => {
    const iniziale = String(b.matricola || '').trim().charAt(0).toUpperCase();
    return iniziale === 'A' || iniziale === 'F';
  });

  const extraurbani = inServizio.filter(b => {
    const iniziale = String(b.matricola || '').trim().charAt(0).toUpperCase();
    return iniziale === 'K' || iniziale === 'L';
  });

  const altri = inServizio.filter(b => {
    const iniziale = String(b.matricola || '').trim().charAt(0).toUpperCase();
    return !['A', 'F', 'K', 'L'].includes(iniziale);
  });

  const fuori = buses.filter(b => !!b.fuoriServizio);
  return { urbani, extraurbani, altri, fuori };
}

    tipo === 'extraurbani' ? 'extraurbano' :

function fmtDate(d) {
  if (!d) return '';
  const p = String(d).split('-');
  return p.length === 3 ? `${p[2]}/${p[1]}/${p[0].slice(-2)}` : esc(d);
}

function normalizeDate(raw) {
  raw = String(raw || '').replace(/\D/g, '').slice(0, 6);
  if (raw.length !== 6) return null;

  const day = raw.slice(0, 2);
  const month = raw.slice(2, 4);
  const year = '20' + raw.slice(4, 6);
  const dt = new Date(+year, +month - 1, +day);

  if (dt.getFullYear() !== +year || dt.getMonth() !== +month - 1 || dt.getDate() !== +day) {
    return null;
  }

  return `${year}-${month}-${day}`;
}

function renderDateColumns(dates, segId) {
  const sorted = [...dates].sort();
  const total = sorted.length;
  const usedIndexes = new Set();

  function originalIndexFor(dateValue) {
    let idx = dates.findIndex((v, i) => v === dateValue && !usedIndexes.has(i));
    if (idx < 0) idx = dates.indexOf(dateValue);
    usedIndexes.add(idx);
    return idx;
  }

  function renderItem(item) {
    return `
      <span class="date-tag">
        <span class="date-main">
          <span class="date-num">${item.num}.</span>
          <span class="date-value">${fmtDate(item.date)}</span>
        </span>
        <span class="date-x" onclick="rimuoviData('${segId}',${item.originalIndex})">✕</span>
      </span>`;
  }

  if (total <= 4) {
    const items = sorted.map((d, i) => ({
      date: d,
      num: i + 1,
      originalIndex: originalIndexFor(d)
    }));

    return `
      <div class="date-columns date-columns-single">
        <div class="date-column">
          ${items.map(renderItem).join('')}
        </div>
      </div>`;
  }

  const leftCount = total <= 8 ? 4 : Math.ceil(total / 2);
  const left = [];
  const right = [];

  sorted.forEach((d, i) => {
    const item = {
      date: d,
      num: i + 1,
      originalIndex: originalIndexFor(d)
    };

    if (i < leftCount) left.push(item);
    else right.push(item);
  });

  return `
    <div class="date-columns">
      <div class="date-column">${left.map(renderItem).join('')}</div>
      <div class="date-column">${right.map(renderItem).join('')}</div>
    </div>`;
}

    ? renderDateColumns(dates, s.id)

  return `
    <details class="seg-card ${pregressa ? 'pregressa' : ''}" id="seg-${s.id}" ${openSegIds.has(s.id) ? 'open' : ''} ontoggle="trackSegOpen(\'${s.id}\', this)">

          </span>
        </span>
        <span class="chev"><span class="closed">▾</span><span class="open">▴</span></span>
      </summary>

      <div class="seg-body">
        ${datesHtml}

        ${!pregressa ? `
          <div class="date-add-wrap">
            <div class="today-inline" id="today-${s.id}"></div>
            <div class="date-add-row">
              <input class="date-input" id="date-${s.id}" placeholder="GG/MM/AA" maxlength="8" inputmode="numeric"
                onfocus="showTodayInline('${s.id}')"
                onblur="hideTodayInline('${s.id}')"
                oninput="autoSaveDate('${s.id}',this)">
            </div>
          </div>` : ''}

        <div class="seg-actions">
          ${!pregressa ? `
            <button class="small-action" onclick="moveSeg('${s.id}',-1)">↑</button>
            <button class="small-action" onclick="moveSeg('${s.id}',1)">↓</button>
            <button class="small-action archive" onclick="archiviaSeg('${s.id}')">Archivio</button>
          ` : `
            <button class="small-action restore" onclick="ripristinaSeg('${s.id}')">Ripristina</button>
          `}
          <button class="small-action notes ${String(s.note || '').trim() ? 'has-note' : ''}" onclick="toggleNote('${s.id}')">📝 Note${String(s.note || '').trim() ? ' (1)' : ''}</button>
          <button class="small-action icon" onclick="editSeg('${s.id}')" title="Modifica">✎</button>
          <button class="small-action icon" onclick="deleteSeg('${s.id}')" title="Elimina">🗑</button>
        </div>

        <div class="notes-box ${openNoteIds.has(s.id) ? 'open' : ''}" id="notes-${s.id}">
          <div class="notes-label">Note libere</div>
          <textarea class="notes-textarea" placeholder="Scrivi qui le tue note..." onclick="event.stopPropagation()" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()" oninput="autoSaveNote('${s.id}', this)">${esc(s.note || '')}</textarea>
        </div>
      </div>
    </details>`;
}

function showBusDetail(mat) {

  const serviceButtonText = isFuori ? 'Metti in Servizio' : 'Metti in Fuori Servizio';
  const serviceButtonClass = isFuori ? 'btn-service-main in-service' : 'btn-service-main';

  const all = segnalazioni.filter(s => s.bus === mat);
  const active = all.filter(s => !s.pregressa).sort(bySeg);
  const arch = all.filter(s => !!s.pregressa).sort(bySeg);

  let html = '';
  html += active.length
    ? `<div class="seg-list">${active.map(s => renderSeg(s, false)).join('')}</div>`
    : '<div class="empty">Nessuna anomalia attiva per questo autobus.</div>';

  if (archiveVisible) {

      <div class="archive-box">
        <div class="archive-title">Vecchie segnalazioni</div>
        ${arch.length ? `<div class="seg-list">${arch.map(s => renderSeg(s, true)).join('')}</div>` : '<div class="empty">Archivio vuoto.</div>'}
      </div>`;
  }

  html += `
    <div class="detail-main-actions">
      <button class="btn-primary" onclick="openModal('${esc(mat)}')">+ Aggiungi segnalazione</button>
      <button class="btn-yellow-main" onclick="togglePregresse()">Vecchie segnalazioni (${arch.length})</button>
      <button class="btn-delete-bus" onclick="deleteBus()">Elimina bus</button>
      <button class="${serviceButtonClass}" onclick="toggleFuoriServizio()">${serviceButtonText}</button>
      <button class="btn-share-main" onclick="openShareModal()">Condividi anomalie</button>
    </div>`;

  document.getElementById('detailContent').innerHTML = html;
}

window.togglePregresse = function() {
  archiveVisible = !archiveVisible;
  if (selectedBus) showBusDetail(selectedBus);
};

window.openModal = function(mat) {
  currentBusForModal = mat;
  editingSegId = null;
  document.getElementById('modalTitle').textContent = 'NUOVA SEGNALAZIONE';
  document.getElementById('formDesc').value = '';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('formDesc').focus(), 80);
};

window.closeModal = function() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingSegId = null;
};

window.saveSegnalazione = async function() {
  const desc = document.getElementById('formDesc').value.trim();
  if (!desc) {
    alert('Inserisci una descrizione.');
    return;
  }

  if (editingSegId) {
    const esistente = segnalazioni.find(x => x.id === editingSegId);
    await updateDoc(doc(db, 'segnalazioni', editingSegId), { desc });
    const prima = String(esistente?.desc || '').trim();
    const dettaglio = prima && prima !== desc
      ? 'Prima: ' + prima + ' — Adesso: ' + desc
      : 'Anomalia: ' + desc;
    await registraModifica(esistente?.bus || currentBusForModal, 'Anomalia modificata', dettaglio);
    showToast('Segnalazione aggiornata');
  } else {
    await addDoc(collection(db, 'segnalazioni'), {
      bus:currentBusForModal,
      desc,
      stato:'aperta',
      pregressa:false,
      standby:false,
      note:'',
      createdAt:new Date().toISOString()
    });
    await registraModifica(currentBusForModal, 'Nuova anomalia', 'Anomalia: ' + desc);
    showToast('Segnalazione salvata');
  }

  closeModal();
};

window.editSeg = function(id) {
  const s = segnalazioni.find(x => x.id === id);
  if (!s) return;

  editingSegId = id;
  currentBusForModal = s.bus;
  document.getElementById('modalTitle').textContent = 'MODIFICA SEGNALAZIONE';
  document.getElementById('formDesc').value = s.desc || '';
  document.getElementById('modalOverlay').classList.add('open');
};

window.deleteSeg = async function(id) {
  const s = segnalazioni.find(x => x.id === id);
  const ok = confirm("Eliminare questa anomalia?\n\nL'operazione eliminerà l'anomalia e tutte le date associate.");
  if (!ok) return;

  await deleteDoc(doc(db, 'segnalazioni', id));
  await registraModifica(s?.bus || selectedBus, 'Anomalia eliminata', 'Anomalia: ' + (s?.desc || ''));
  showToast('Anomalia eliminata');
};

window.archiviaSeg = async function(id) {
  const ok = confirm("Spostare questa anomalia nelle vecchie segnalazioni?");
  if (!ok) return;

  const s = segnalazioni.find(x => x.id === id);
  await updateDoc(doc(db, 'segnalazioni', id), { pregressa:true, standby:false });
  await registraModifica(s?.bus || selectedBus, 'Anomalia archiviata', 'Anomalia: ' + (s?.desc || ''));
  archiveVisible = true;
  showToast('Spostata in archivio');
};

window.ripristinaSeg = async function(id) {
  const s = segnalazioni.find(x => x.id === id);
  await updateDoc(doc(db, 'segnalazioni', id), { pregressa:false, standby:false });
  await registraModifica(s?.bus || selectedBus, 'Anomalia ripristinata', 'Anomalia: ' + (s?.desc || ''));
  showToast('Anomalia ripristinata');
};


window.trackSegOpen = function(id, el) {
  if (el && el.open) {
    openSegIds.add(id);
  } else {
    openSegIds.delete(id);
    openNoteIds.delete(id);
  }
};

window.toggleNote = function(id) {
  const seg = document.getElementById('seg-' + id);
  if (seg) {
    seg.open = true;
    openSegIds.add(id);
  }

  const box = document.getElementById('notes-' + id);
  if (!box) return;

  box.classList.toggle('open');

  if (box.classList.contains('open')) {
    openNoteIds.add(id);
  } else {
    openNoteIds.delete(id);
  }

  const txt = box.querySelector('textarea');
  if (box.classList.contains('open') && txt) {
    setTimeout(() => txt.focus(), 50);
  }
};

let noteTimers = {};
window.autoSaveNote = function(id, textarea) {
  openSegIds.add(id);
  openNoteIds.add(id);

  const local = segnalazioni.find(x => x.id === id);
  if (local) local.note = textarea.value;

  clearTimeout(noteTimers[id]);
  noteTimers[id] = setTimeout(async () => {
    try {
      await updateDoc(doc(db, 'segnalazioni', id), { note:textarea.value });
      const s = segnalazioni.find(x => x.id === id);
      const nota = String(textarea.value || '').trim();
      const dettaglio = 'Anomalia: ' + (s?.desc || '') + (nota ? ' — Nota: ' + nota : ' — Nota cancellata');
      await registraModifica(s?.bus || selectedBus, 'Nota aggiornata', dettaglio);
    } catch(e) {
      console.error(e);
      showToast('Errore salvataggio note');
    }
  }, 900);
};


function dataOggiEstesa() {
  return new Date().toLocaleDateString('it-IT', {
    weekday:'long',
    day:'numeric',
    month:'long',
    year:'numeric'
  });
}

window.showTodayInline = function(id) {
  const el = document.getElementById('today-' + id);
  if (!el) return;
  const d = new Date();
  const gg = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth() + 1).padStart(2,'0');
  const aa = String(d.getFullYear()).slice(-2);
  const data = `${gg}/${mm}/${aa}`;
  el.innerHTML =
    '<span class="today-arrow" aria-hidden="true">→</span>' +
    '<span class="today-text">OGGI È IL ' + data + '</span>' +
    '<span class="today-arrow" aria-hidden="true">←</span>';
  el.classList.add('visible');
};

window.hideTodayInline = function(id) {
  const el = document.getElementById('today-' + id);
  if (!el) return;
  setTimeout(() => el.classList.remove('visible'), 120);
};

window.autoSaveDate = async function(id, input) {
  const raw = input.value.replace(/\D/g, '').slice(0, 6);
  input.value = raw.length <= 2
    ? raw
    : (raw.length <= 4 ? raw.slice(0,2) + '/' + raw.slice(2) : raw.slice(0,2) + '/' + raw.slice(2,4) + '/' + raw.slice(4));

  if (raw.length !== 6) return;

  const data = normalizeDate(raw);
  if (!data) {
    showToast('Data non valida');
    input.value = '';
    return;
  }

  const s = segnalazioni.find(x => x.id === id);
  if (!s) return;

  const dates = Array.isArray(s.date) ? [...s.date] : [];
  dates.push(data);
  dates.sort();

  await updateDoc(doc(db, 'segnalazioni', id), { date:dates });
  await registraModifica(
    s.bus,
    'Aggiunta data ' + fmtDate(data),
    'Anomalia: ' + (s.desc || '')
  );
  showToast('Data registrata');

  setTimeout(() => {
    openSegIds.add(id);
    const el = document.getElementById('seg-' + id);
    if (el) el.open = true;
  }, 80);
};

window.rimuoviData = async function(id, idx) {
  const s = segnalazioni.find(x => x.id === id);
  if (!s || !Array.isArray(s.date)) return;
  if (!confirm('Eliminare questa data?')) return;

  const dataEliminata = s.date[idx];
  const dates = s.date.filter((_, i) => i !== idx);
  await updateDoc(doc(db, 'segnalazioni', id), { date:dates });
  await registraModifica(
    s.bus,
    'Eliminata data ' + (dataEliminata ? fmtDate(dataEliminata) : ''),
    'Anomalia: ' + (s.desc || '')
  );
};

window.moveSeg = async function(id, dir) {
  if (!selectedBus) return;

  const list = segnalazioni.filter(s => s.bus === selectedBus && !s.pregressa).sort(bySeg);
  const idx = list.findIndex(s => s.id === id);
  const target = idx + dir;

  if (idx < 0 || target < 0 || target >= list.length) return;

  const reordered = list.slice();
  const item = reordered.splice(idx, 1)[0];
  reordered.splice(target, 0, item);

  await Promise.all(reordered.map((s, i) => updateDoc(doc(db, 'segnalazioni', s.id), { order:i })));
  await registraModifica(selectedBus, 'Ordine delle anomalie modificato', 'Anomalia: ' + (item.desc || ''));
};


window.deleteBus = async function() {
  if (!selectedBus) return;

  const bus = buses.find(b => b.matricola === selectedBus);
  if (!bus) return;

  const ok = confirm(
    "Eliminare definitivamente l'autobus " + selectedBus + "?\n\n" +
    "Questa operazione eliminerà anche tutte le anomalie, le note e lo storico associati al mezzo."
  );

  if (!ok) return;

  try {
    const associate = segnalazioni.filter(s => s.bus === selectedBus);

    for (const s of associate) {
      await deleteDoc(doc(db, 'segnalazioni', s.id));
    }

    await deleteDoc(doc(db, 'buses', bus.id));
    await registraModifica(selectedBus, 'Autobus eliminato');

    showToast('Autobus eliminato');
    closeDetail();
  } catch (e) {
    console.error(e);
    alert("Errore durante l'eliminazione dell'autobus.");
  }
};

window.toggleFuoriServizio = async function() {
  if (!selectedBus) return;

  const bus = buses.find(b => b.matricola === selectedBus);
  if (!bus) return;

  const nuovoStato = !bus.fuoriServizio;
  await updateDoc(doc(db, 'buses', bus.id), { fuoriServizio:nuovoStato });
  await registraModifica(selectedBus, nuovoStato ? 'Autobus messo fuori servizio' : 'Autobus rimesso in servizio');
};


function testoCondivisioneAnomalie(bus, anomalie) {
  const righe = anomalie.map(a => {
    const desc = String(a.desc || '').trim();
    if (!desc) return '';
    const count = Array.isArray(a.date) ? a.date.length : 0;
    const label = count === 1 ? 'segnalato 1 volta' : `segnalato ${count} volte`;
    return `• *${desc}*\n_(${label})_`;
  }).filter(Boolean);

  return `${bus}

Verifica quanto segue:

${righe.join('\n\n')}

Se ritieni opportuno, segnala sul diario. Grazie`;
}

async function condividiTesto(text) {
  try {
    if (navigator.share) {
      await navigator.share({ text });
      return;
    }
  } catch(e) {
    if (e && (e.name === 'AbortError' || e.name === 'NotAllowedError')) return;
  }

  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
      showToast('Testo copiato');
      return;
    }
  } catch(e) {}

  alert(text);
}

window.openShareModal = function() {
  if (!selectedBus) return;

  const active = segnalazioni
    .filter(s => s.bus === selectedBus && !s.pregressa)
    .sort(bySeg);

  const list = document.getElementById('shareList');

  if (!active.length) {
    list.innerHTML = '<div class="empty">Nessuna anomalia attiva da condividere.</div>';
  } else {
    list.innerHTML = active.map(s => `
      <label class="share-item">
        <input type="checkbox" class="share-check" value="${esc(s.id)}">
        <span>${esc(s.desc)}</span>
      </label>
    `).join('');
  }

  document.getElementById('shareModalOverlay').classList.add('open');
};

window.closeShareModal = function() {
  document.getElementById('shareModalOverlay').classList.remove('open');
};

window.selezionaTutteAnomalie = function() {
  document.querySelectorAll('.share-check').forEach(c => c.checked = true);
};

window.deselezionaTutteAnomalie = function() {
  document.querySelectorAll('.share-check').forEach(c => c.checked = false);
};

window.condividiAnomalieSelezionate = async function() {
  if (!selectedBus) return;

  const ids = Array.from(document.querySelectorAll('.share-check:checked')).map(c => c.value);
  if (!ids.length) {
    showToast('Seleziona almeno una anomalia');
    return;
  }

  const selected = segnalazioni
    .filter(s => ids.includes(s.id))
    .sort(bySeg);

  const text = testoCondivisioneAnomalie(selectedBus, selected);
  await condividiTesto(text);
  closeShareModal();
};



let swipeStartX = 0;
let swipeStartY = 0;
let swipeCurrentX = 0;
let swipeTracking = false;

function hardResetSwipeVisual() {
  const detail = document.getElementById('detailView');
  if (!detail) return;

  detail.classList.remove('swiping', 'swipe-back');
  detail.style.transform = 'translateX(0)';
  detail.style.opacity = '1';
  detail.style.width = '100%';
  detail.style.marginLeft = 'auto';
  detail.style.marginRight = 'auto';
}

function resetSwipeVisual() {
  const detail = document.getElementById('detailView');
  if (!detail) return;

  detail.classList.remove('swiping');
  detail.classList.add('swipe-back');
  detail.style.transform = 'translateX(0)';
  detail.style.opacity = '1';

  setTimeout(() => {
    hardResetSwipeVisual();
  }, 200);
}

document.addEventListener('touchstart', e => {
  if (!selectedBus || e.touches.length !== 1) return;

  const touch = e.touches[0];
  if (touch.clientX > 42) return;

  swipeStartX = touch.clientX;
  swipeStartY = touch.clientY;
  swipeCurrentX = touch.clientX;
  swipeTracking = true;

  const detail = document.getElementById('detailView');
  if (detail) {
    detail.classList.add('swiping');
    detail.classList.remove('swipe-back');
  }
}, { passive:true });

document.addEventListener('touchmove', e => {
  if (!swipeTracking || !selectedBus || e.touches.length !== 1) return;

  const touch = e.touches[0];
  const deltaX = touch.clientX - swipeStartX;
  const deltaY = touch.clientY - swipeStartY;

  if (Math.abs(deltaY) > Math.abs(deltaX) && Math.abs(deltaY) > 18) {
    swipeTracking = false;
    resetSwipeVisual();
    return;
  }

  if (deltaX <= 0) return;

  swipeCurrentX = touch.clientX;

  const detail = document.getElementById('detailView');
  if (detail) {
    const visualX = Math.min(deltaX, 150);
    detail.style.transform = `translateX(${visualX * 0.35}px)`;
    detail.style.opacity = String(Math.max(0.72, 1 - deltaX / 420));
  }
}, { passive:true });

document.addEventListener('touchend', () => {
  if (!swipeTracking || !selectedBus) {
    swipeTracking = false;
    return;
  }

  const distance = swipeCurrentX - swipeStartX;
  swipeTracking = false;

  if (distance >= 90) {
    hardResetSwipeVisual();
    closeDetail();
  } else {
    resetSwipeVisual();
  }
}, { passive:true });

document.addEventListener('touchcancel', () => {
  swipeTracking = false;
  resetSwipeVisual();
}, { passive:true });





aggiornaPosizioneHeaderVisuale();

window.addEventListener('resize', hardResetSwipeVisual);
window.addEventListener('orientationchange', hardResetSwipeVisual);
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) hardResetSwipeVisual();
});

window.esportaDati = function() {
  const data = {
    buses:buses.map(b => ({ matricola:b.matricola, fuoriServizio:!!b.fuoriServizio })),
    segnalazioni
  };

  const blob = new Blob([JSON.stringify(data, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'gestione-bus-dati.json';
  a.click();
  URL.revokeObjectURL(url);
};

window.importaDati = async function(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!confirm('Importare i dati? I dati attuali verranno sostituiti.')) return;

      const oldB = await getDocs(collection(db, 'buses'));
      for (const d of oldB.docs) await deleteDoc(doc(db, 'buses', d.id));

      const oldS = await getDocs(collection(db, 'segnalazioni'));
      for (const d of oldS.docs) await deleteDoc(doc(db, 'segnalazioni', d.id));

      for (const item of data.buses || []) {
        const mat = typeof item === 'string' ? item : item.matricola;
        if (mat) await addDoc(collection(db, 'buses'), { matricola:mat, fuoriServizio:!!item.fuoriServizio });
      }

      for (const seg of data.segnalazioni || []) {
        const { id, ...rest } = seg;
        await addDoc(collection(db, 'segnalazioni'), rest);
      }

      await registraModifica('SISTEMA', 'Dati importati');
      showToast('Dati importati');
    } catch(err) {
      alert('File non valido');
    }
  };

  reader.readAsText(file);
};

window.addEventListener('popstate', event => {
  const state = event.state || { gestioneBusView:'home' };
  const view = state.gestioneBusView || 'home';

  document.getElementById('recentChangesOverlay').classList.remove('open');

  if (view === 'detail' && state.bus) {
    currentCategory = state.category || currentCategory || 'urbani';
    window.selectBus(state.bus, true);
    return;
  }

  if (selectedBus) {
    window.closeDetail(true);
  }

  if (view === 'category' && state.category) {
    window.openCategory(state.category, true);
    return;
  }

  document.getElementById('categoryView').classList.remove('open');

  if (view === 'topics') {
    window.openTopics(true);
    return;
  }

  document.getElementById('topicsView').classList.remove('open');
  currentCategory = null;
  selectedBus = null;
  document.getElementById('detailView').classList.remove('open');
  document.getElementById('homeView').style.display = 'block';
  setHomeScrollLocked(true);
  renderBusGrid();
  forzaScrollInAlto();

  if (view === 'recent') {
    window.openRecentChanges(true);
  }
});

let navigationSwipe = null;
let suppressNavigationClick = false;

function getOpenNavigationView() {
  const categoryView = document.getElementById('categoryView');
  if (categoryView?.classList.contains('open')) {
    return { view:categoryView, close:window.closeCategory };
  }

  const topicsView = document.getElementById('topicsView');
  if (topicsView?.classList.contains('open')) {
    return { view:topicsView, close:window.closeTopics };
  }

  const recentOverlay = document.getElementById('recentChangesOverlay');
  if (recentOverlay?.classList.contains('open')) {
    return { view:recentOverlay, close:window.closeRecentChanges };
  }

  return null;
}

function resetNavigationSwipe() {
  if (!navigationSwipe?.view) {
    navigationSwipe = null;
    return;
  }

  const view = navigationSwipe.view;
  view.style.transition = 'transform .18s ease, opacity .18s ease';
  view.style.transform = 'translateX(0)';
  view.style.opacity = '1';

  setTimeout(() => {
    view.style.transition = '';
    view.style.transform = '';
    view.style.opacity = '';
  }, 190);

  navigationSwipe = null;
}

document.addEventListener('touchstart', e => {
  if (e.touches.length !== 1) return;

  const openView = getOpenNavigationView();
  if (!openView) return;

  const touch = e.touches[0];
  navigationSwipe = {
    ...openView,
    startX:touch.clientX,
    startY:touch.clientY,
    currentX:touch.clientX,
    horizontal:false
  };

  openView.view.style.transition = 'none';
}, { passive:true });

document.addEventListener('touchmove', e => {
  if (!navigationSwipe || e.touches.length !== 1) return;

  const touch = e.touches[0];
  const deltaX = touch.clientX - navigationSwipe.startX;
  const deltaY = touch.clientY - navigationSwipe.startY;

  if (!navigationSwipe.horizontal) {
    if (Math.abs(deltaY) > Math.abs(deltaX) && Math.abs(deltaY) > 12) {
      resetNavigationSwipe();
      return;
    }

    if (deltaX > 12 && Math.abs(deltaX) > Math.abs(deltaY)) {
      navigationSwipe.horizontal = true;
    }
  }

  if (!navigationSwipe.horizontal || deltaX <= 0) return;

  e.preventDefault();
  navigationSwipe.currentX = touch.clientX;

  const visualX = Math.min(deltaX, 180);
  navigationSwipe.view.style.transform = `translateX(${visualX * 0.42}px)`;
  navigationSwipe.view.style.opacity = String(Math.max(.76, 1 - deltaX / 500));
}, { passive:false });

document.addEventListener('touchend', () => {
  if (!navigationSwipe) return;

  const distance = navigationSwipe.currentX - navigationSwipe.startX;
  const shouldClose = navigationSwipe.horizontal && distance >= 70;
  const closeView = navigationSwipe.close;
  const view = navigationSwipe.view;

  if (shouldClose) {
    suppressNavigationClick = true;
    navigationSwipe = null;
    view.style.transition = '';
    view.style.transform = '';
    view.style.opacity = '';
    closeView();
    setTimeout(() => { suppressNavigationClick = false; }, 350);
    return;
  }

  resetNavigationSwipe();
}, { passive:true });

document.addEventListener('touchcancel', resetNavigationSwipe, { passive:true });

document.addEventListener('click', e => {
  if (!suppressNavigationClick) return;
  e.preventDefault();
  e.stopPropagation();
}, true);
</script>
