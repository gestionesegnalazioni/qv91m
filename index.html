<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gestione Bus v5.3</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#080b12;
    --panel:#101623;
    --card:#182030;
    --border:rgba(255,255,255,.12);
    --text:#f4f7fb;
    --muted:#9aa4b2;
    --green:#34d399;
    --red:#ef4444;
    --accent:#f5c84b;
    --blue:#93c5fd;
    --font-mono:'Space Mono',monospace;
    --font-sans:'DM Sans',sans-serif;
  }

  * {
    box-sizing:border-box;
    margin:0;
    padding:0;
    max-width:100%;
  }

  body {
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-sans);
    min-height:100vh;
    overflow-x:hidden;
  }

  header {
    position:sticky;
    top:0;
    z-index:10;
    background:rgba(8,11,18,.78);
    backdrop-filter:blur(18px);
    border-bottom:1px solid rgba(255,255,255,.08);
    padding:16px;
    display:flex;
    justify-content:flex-end;
    align-items:center;
  }

  .header-date {
    font-family:var(--font-mono);
    font-size:.72rem;
    color:var(--muted);
    margin-right:12px;
    text-align:right;
  }

  .wrapper {
    width:100%;
    max-width:720px;
    margin:0 auto;
    padding:20px 16px 260px;
  }

  .bus-tile,
  .bus-detail,
  .modal,
  .add-bus-form,
  .seg-card {
    background:linear-gradient(145deg,rgba(255,255,255,.08),rgba(255,255,255,.035));
    border:1px solid var(--border);
    box-shadow:0 14px 40px rgba(0,0,0,.24);
    backdrop-filter:blur(16px);
  }

  button {
    font-family:var(--font-mono);
    cursor:pointer;
    border:none;
  }

  .home-bottom-actions {
    margin-top:24px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .btn-primary {
    background:var(--green);
    color:#000;
    border-radius:999px;
    padding:11px 18px;
    font-weight:700;
    font-size:.82rem;
    min-height:40px;
  }

  .btn-yellow-main {
    background:var(--accent);
    color:#000;
    border-radius:999px;
    padding:11px 18px;
    font-weight:700;
    font-size:.82rem;
    min-height:40px;
    width:100%;
  }

  .btn-service-main {
    background:#3b82f6;
    color:#ffffff;
    border:1px solid #3b82f6;
    border-radius:999px;
    padding:11px 18px;
    font-weight:700;
    font-size:.82rem;
    min-height:40px;
    width:100%;
  }

  .btn-service-main.in-service {
    color:#000;
    background:var(--green);
    border-color:var(--green);
  }

  .btn-share-main {
    background:rgba(255,255,255,.10);
    color:var(--text);
    border:1px solid rgba(255,255,255,.24);
    border-radius:999px;
    padding:11px 18px;
    font-weight:700;
    font-size:.82rem;
    min-height:40px;
    width:100%;
  }

  .share-list {
    display:flex;
    flex-direction:column;
    gap:8px;
    margin:10px 0 14px;
    max-height:52vh;
    overflow:auto;
    padding-right:2px;
  }

  .share-item {
    display:flex;
    align-items:flex-start;
    gap:10px;
    padding:10px;
    border:1px solid rgba(255,255,255,.12);
    border-radius:12px;
    background:rgba(255,255,255,.04);
    color:var(--text);
    font-size:.88rem;
    line-height:1.35;
  }

  .share-item input {
    width:18px;
    height:18px;
    flex:0 0 18px;
    margin-top:2px;
  }

  .share-actions-row {
    display:flex;
    gap:8px;
    justify-content:flex-end;
    flex-wrap:wrap;
    margin-bottom:8px;
  }

  .btn-ghost,
  .btn-blue {
    background:transparent;
    border:1px solid var(--border);
    border-radius:999px;
    padding:0 14px;
    height:38px;
    min-width:136px;
    font-size:.76rem;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    white-space:nowrap;
  }

  .btn-ghost {
    color:var(--muted);
  }

  .btn-blue {
    color:var(--blue);
    border-color:rgba(59,130,246,.55);
  }

  .btn-blue.in-service {
    color:#86efac;
    border-color:rgba(34,197,94,.52);
  }

  .btn-ghost:hover {
    color:var(--text);
    border-color:rgba(255,255,255,.28);
  }

  .btn-back-round {
    width:40px;
    height:40px;
    min-width:40px;
    border-radius:50%;
    background:transparent;
    color:var(--muted);
    border:1px solid rgba(255,255,255,.18);
    font-size:1.15rem;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:0;
    line-height:1;
  }

  .btn-back-round:hover,
  .btn-back-round:active {
    background:rgba(255,255,255,.06);
    border-color:rgba(255,255,255,.28);
    color:var(--text);
  }

  .add-bus-form {
    display:none;
    border-radius:18px;
    padding:14px;
    margin-top:10px;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
  }

  .add-bus-form.open {
    display:flex;
  }

  input,
  textarea {
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.18);
    border-radius:14px;
    color:var(--text);
    outline:none;
    font-family:var(--font-sans);
  }

  input:focus,
  textarea:focus {
    border-color:rgba(245,200,75,.65);
  }

  .bus-input {
    padding:11px 14px;
    font-family:var(--font-mono);
    width:190px;
    text-transform:uppercase;
  }

  .bus-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(132px,1fr));
    gap:12px;
  }

  .bus-grid-section {
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:12px;
    grid-column:1/-1;
    width:100%;
  }

  .bus-section-title {
    font-family:var(--font-mono);
    font-size:.72rem;
    color:var(--muted);
    letter-spacing:1px;
    text-transform:uppercase;
    margin:18px 0 10px;
    grid-column:1/-1;
    text-align:center;
  }

  .bus-section-title:first-child {
    margin-top:0;
  }

  .bus-tile {
    border-radius:22px;
    min-height:112px;
    padding:16px 16px 14px;
    position:relative;
    overflow:hidden;
    text-align:left;
    border:1px solid rgba(255,255,255,.12)!important;
    background:linear-gradient(145deg,rgba(255,255,255,.075),rgba(255,255,255,.025));
    box-shadow:0 14px 34px rgba(0,0,0,.24), inset 0 1px 0 rgba(255,255,255,.035);
    transition:transform .16s ease, border-color .16s ease, background .16s ease;
  }

  .bus-tile:active {
    transform:scale(.975);
    background:linear-gradient(145deg,rgba(255,255,255,.095),rgba(255,255,255,.035));
  }

  .bus-card-top {
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }

  .bus-number {
    font-family:var(--font-mono);
    font-size:1.18rem;
    font-weight:700;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    color:var(--text)!important;
  }

  .bus-icon {
    width:25px;
    height:25px;
    flex:0 0 25px;
    color:rgba(255,255,255,.62);
  }

  .bus-card-line {
    height:1px;
    background:rgba(255,255,255,.10);
    margin:12px 0 10px;
    width:100%;
  }

  .bus-count {
    font-family:var(--font-mono);
    font-size:.72rem;
    color:var(--muted);
    font-weight:500;
  }

  .bus-count.active {
    color:var(--red);
    font-weight:700;
  }

  .bus-count.zero {
    color:var(--muted);
    font-weight:500;
  }

  .bus-tile.fuori-servizio {
    border-color:rgba(59,130,246,.72)!important;
    box-shadow:0 14px 34px rgba(59,130,246,.10), inset 0 1px 0 rgba(255,255,255,.035)!important;
  }

  .bus-tile.fuori-servizio .bus-number {
    color:var(--blue)!important;
  }

  .bus-tile.fuori-servizio .bus-icon {
    color:var(--blue);
  }

  .bus-fuori-label {
    font-family:var(--font-mono);
    font-size:.68rem;
    color:var(--blue);
    margin-top:6px;
  }

  .bus-detail {
    display:none;
    background:transparent!important;
    border:none!important;
    box-shadow:none!important;
    backdrop-filter:none!important;
    padding:0!important;
  }

  .bus-detail.open {
    display:flex;
    flex-direction:column;
    min-height:calc(100dvh - 86px);
    padding-bottom:22vh!important;
  }

  .detail-top {
    display:flex;
    justify-content:flex-start;
    align-items:center;
    gap:12px;
    margin-bottom:16px;
  }

  .detail-num {
    font-family:var(--font-mono);
    font-size:1.65rem;
    color:var(--green);
    font-weight:700;
    letter-spacing:1px;
    min-height:64px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:6px 0 18px;
    text-align:center;
  }

  .seg-list {
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .seg-card {
    border-radius:18px;
    padding:12px;
  }

  .seg-card.pregressa {
    border-color:rgba(245,200,75,.38);
    opacity:.94;
  }

  details summary {
    list-style:none;
    cursor:pointer;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
  }

  details summary::-webkit-details-marker {
    display:none;
  }

  .seg-title-wrap {
    display:flex;
    gap:10px;
    align-items:flex-start;
    min-width:0;
    flex:1;
  }

  .seg-dot {
    width:7px;
    height:7px;
    border-radius:50%;
    background:var(--muted);
    flex:0 0 7px;
    margin-top:7px;
  }

  .seg-desc {
    font-size:.95rem;
    line-height:1.35;
    word-break:break-word;
  }

  .seg-title-text {
    display:flex;
    flex-direction:column;
    gap:3px;
    min-width:0;
  }

  .seg-count-preview {
    font-family:var(--font-mono);
    font-size:.70rem;
    color:var(--muted);
    line-height:1.2;
  }

  .seg-count-preview strong {
    color:var(--red);
    font-weight:700;
  }

  .chev {
    color:var(--muted);
    border:1px solid rgba(255,255,255,.14);
    border-radius:999px;
    width:28px;
    height:24px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:.78rem;
    flex:0 0 28px;
  }

  details[open] .chev .closed {
    display:none;
  }

  details:not([open]) .chev .open {
    display:none;
  }

  .seg-body {
    margin-top:10px;
  }

  .date-info {
    font-family:var(--font-mono);
    font-size:.75rem;
    color:var(--muted);
    margin-bottom:8px;
  }

  .date-columns {
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:8px;
    margin-bottom:10px;
    width:100%;
  }

  .date-columns-single {
    grid-template-columns:minmax(0,1fr);
  }

  .date-column {
    display:flex;
    flex-direction:column;
    gap:5px;
    min-width:0;
  }

  .date-tag {
    display:grid;
    grid-template-columns:minmax(0,1fr) 22px;
    align-items:center;
    gap:6px;
    background:rgba(255,255,255,.05);
    border:1px solid var(--border);
    border-radius:8px;
    padding:5px 6px 5px 7px;
    font-family:var(--font-mono);
    font-size:.70rem;
    color:var(--muted);
    min-width:0;
    width:100%;
  }

  .date-main {
    display:inline-flex;
    align-items:center;
    gap:4px;
    min-width:0;
    white-space:nowrap;
    overflow:visible;
  }

  .date-num {
    color:rgba(255,255,255,.72);
    font-weight:700;
    min-width:20px;
    text-align:right;
    flex:0 0 20px;
  }

  .date-value {
    white-space:nowrap;
  }

  .date-x {
    cursor:pointer;
    width:22px;
    height:20px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    justify-self:end;
    padding:0;
    flex:0 0 22px;
    font-size:.72rem;
    line-height:1;
  }

  .date-x:hover {
    color:var(--red);
  }

  .date-add-row {
    display:flex;
    align-items:center;
    gap:7px;
    margin-top:6px;
  }

  .date-plus {
    color:var(--green);
    font-family:var(--font-mono);
    font-size:1rem;
    font-weight:700;
    line-height:1;
    pointer-events:none;
    user-select:none;
  }

  .date-input {
    width:92px;
    padding:6px 8px;
    text-align:center;
    font-family:var(--font-mono);
    font-size:.78rem;
  }

  .seg-actions {
    display:flex;
    gap:6px;
    flex-wrap:nowrap;
    margin-top:10px;
    padding-top:9px;
    border-top:1px solid rgba(255,255,255,.08);
    justify-content:center;
    align-items:center;
    overflow:hidden;
  }

  .small-action {
    background:transparent;
    color:var(--muted);
    border:1px solid rgba(255,255,255,.14);
    border-radius:999px;
    min-width:28px;
    height:26px;
    padding:0 8px;
    font-size:.66rem;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    white-space:nowrap;
    flex:0 0 auto;
  }

  .small-action.archive {
    color:var(--accent);
    border-color:rgba(245,200,75,.42);
  }

  .small-action.restore {
    color:#86efac;
    border-color:rgba(34,197,94,.42);
  }

  .small-action.icon {
    color:var(--muted);
    width:28px;
    min-width:28px;
    padding:0;
    font-size:.78rem;
  }

  .small-action.notes {
    color:var(--muted);
    border-color:rgba(255,255,255,.14);
  }

  .small-action.notes.has-note {
    color:var(--blue);
    border-color:rgba(59,130,246,.45);
  }

  .notes-box {
    display:none;
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid rgba(255,255,255,.08);
  }

  .notes-box.open {
    display:block;
  }

  .notes-label {
    font-family:var(--font-mono);
    color:var(--muted);
    font-size:.7rem;
    margin-bottom:6px;
    text-transform:uppercase;
    letter-spacing:.5px;
  }

  .notes-textarea {
    width:100%;
    min-height:96px;
    padding:10px;
    resize:vertical;
    font-size:.88rem;
    line-height:1.35;
  }

  .empty {
    color:var(--muted);
    font-size:.88rem;
    padding:10px 0 16px;
    text-align:center;
  }

  .detail-main-actions {
    margin-top:auto;
    padding-top:16px;
    border-top:1px solid rgba(255,255,255,.12);
    display:flex;
    flex-direction:column;
    gap:10px;
  }


  #detailContent {
    display:flex;
    flex-direction:column;
    flex:1;
  }

  .detail-main-actions::before {
    content:'OPZIONI';
    font-family:var(--font-mono);
    font-size:.68rem;
    color:var(--muted);
    letter-spacing:1px;
    text-align:center;
    margin-bottom:2px;
  }

  .archive-box {
    margin-top:18px;
    padding-top:14px;
    border-top:1px solid rgba(255,255,255,.08);
  }

  .archive-title {
    font-family:var(--font-mono);
    font-size:.76rem;
    color:var(--accent);
    margin-bottom:10px;
  }

  .settings-wrap {
    position:relative;
  }

  .settings-btn {
    width:38px;
    height:38px;
    border-radius:50%;
    background:transparent;
    border:1px solid var(--border);
    color:var(--muted);
    font-size:1rem;
  }

  .settings-menu {
    display:none;
    position:fixed;
    right:14px;
    top:64px;
    z-index:99999;
    background:#101623;
    border:1px solid rgba(245,200,75,.75);
    border-radius:12px;
    padding:8px;
    box-shadow:0 22px 60px rgba(0,0,0,.65);
    min-width:180px;
  }

  .settings-menu.open {
    display:block;
  }

  .settings-menu button {
    display:block;
    width:100%;
    background:transparent;
    color:var(--text);
    padding:10px 12px;
    text-align:left;
    border-radius:8px;
    font-size:.75rem;
  }

  .settings-menu button:hover {
    background:rgba(255,255,255,.06);
  }

  .modal-overlay {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.72);
    z-index:200;
    align-items:center;
    justify-content:center;
    padding:16px;
  }

  .modal-overlay.open {
    display:flex;
  }

  .modal {
    border-radius:18px;
    padding:22px;
    width:100%;
    max-width:480px;
  }

  .modal h2 {
    font-family:var(--font-mono);
    font-size:.95rem;
    color:var(--accent);
    margin-bottom:16px;
  }

  .modal textarea {
    width:100%;
    min-height:110px;
    padding:12px;
    resize:vertical;
  }

  .modal-footer {
    display:flex;
    justify-content:flex-end;
    gap:10px;
    margin-top:14px;
  }

  .loading {
    text-align:center;
    padding:40px;
    color:var(--muted);
    font-family:var(--font-mono);
    font-size:.82rem;
  }

  .toast {
    position:fixed;
    bottom:22px;
    right:18px;
    background:var(--green);
    color:#000;
    border-radius:10px;
    padding:10px 14px;
    font-weight:700;
    display:none;
    z-index:300;
    font-size:.82rem;
  }

  @media(max-width:480px) {
    .bus-grid-section {
      grid-template-columns:repeat(2,minmax(0,1fr));
    }

    .bus-tile {
      min-height:108px;
      padding:15px 14px 13px;
    }

    .bus-number {
      font-size:1.12rem;
    }

    .bus-icon {
      width:23px;
      height:23px;
      flex-basis:23px;
    }

    .header-date {
      font-size:.65rem;
    }

    .detail-top {
      gap:8px;
    }

    .btn-ghost,
    .btn-blue {
      min-width:132px;
      height:38px;
      padding:0 10px;
      font-size:.72rem;
    }

    .bus-input {
      width:100%;
    }

    .date-columns {
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:7px;
    }

    .date-tag {
      font-size:.68rem;
      padding:5px 5px 5px 6px;
    }

    .date-num {
      min-width:18px;
      flex-basis:18px;
    }

    .small-action {
      padding:0 6px;
      font-size:.62rem;
    }

    .small-action.icon {
      width:26px;
      min-width:26px;
    }
  }

  @media(max-width:480px) {
    .date-columns {
      grid-template-columns:repeat(2,minmax(0,1fr))!important;
      gap:7px;
    }

    .date-columns-single {
      grid-template-columns:minmax(0,1fr)!important;
    }

    .date-tag {
      grid-template-columns:minmax(0,1fr) 20px!important;
      font-size:.66rem;
      padding:5px 5px 5px 6px;
    }

    .date-num {
      min-width:18px;
      flex-basis:18px;
    }

    .date-x {
      width:20px;
      flex-basis:20px;
    }
  }

</style>
</head>
<body>
<header>
  <div class="header-date" id="headerDate"></div>
  <div class="settings-wrap">
    <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
    <div class="settings-menu" id="settingsMenu">
      <button onclick="esportaDati()">⬇️ Esporta dati</button>
      <button onclick="document.getElementById('importInput').click()">⬆️ Importa dati</button>
      <input type="file" id="importInput" accept=".json" style="display:none" onchange="importaDati(event)">
    </div>
  </div>
</header>

<div class="wrapper">
  <div id="homeView">
    <div class="bus-grid" id="busGrid"><div class="loading">Caricamento...</div></div>

    <div class="home-bottom-actions">
      <button class="btn-primary" onclick="toggleAddForm()">+ Aggiungi autobus</button>
      <div class="add-bus-form" id="addBusForm">
        <input id="inputMatricola" class="bus-input" placeholder="Es. A4148" maxlength="20">
        <button class="btn-primary" onclick="addBus()">Salva</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyBdwNH43PZFgSfKZOEfJtBrF-ooC4NOnGc",
  authDomain:"gestionesegnalazioni.firebaseapp.com",
  projectId:"gestionesegnalazioni",
  storageBucket:"gestionesegnalazioni.firebasestorage.app",
  messagingSenderId:"930504240088",
  appId:"1:930504240088:web:60e43f95f82883b43b20ad",
  measurementId:"G-59G37GQX9J"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let buses = [];
let segnalazioni = [];
let selectedBus = null;
let editingSegId = null;
let currentBusForModal = null;
let archiveVisible = false;
let openSegIds = new Set();
let openNoteIds = new Set();

document.getElementById('headerDate').textContent =
  new Date().toLocaleDateString('it-IT', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

function byMat(a, b) {
  return String(a.matricola || '').localeCompare(String(b.matricola || ''), 'it', { numeric:true });
}

function bySeg(a, b) {
  const ao = typeof a.order === 'number' ? a.order : 999999;
  const bo = typeof b.order === 'number' ? b.order : 999999;
  if (ao !== bo) return ao - bo;
  const ad = a.createdAt ? new Date(a.createdAt).getTime() : 0;
  const bd = b.createdAt ? new Date(b.createdAt).getTime() : 0;
  return bd - ad;
}

function esc(v) {
  return String(v ?? '').replace(/[&<>'"]/g, c => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;'
  }[c]));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 1600);
}
window.showToast = showToast;

function renderAll() {
  renderBusGrid();
  if (selectedBus) showBusDetail(selectedBus);
}
window.renderAll = renderAll;

function forzaScrollInAlto() {
  try {
    window.scrollTo({ top:0, left:0, behavior:'auto' });
    document.documentElement.scrollTop = 0;
    document.body.scrollTop = 0;
  } catch(e) {
    window.scrollTo(0, 0);
  }
}

onSnapshot(collection(db, 'buses'), snap => {
  buses = snap.docs.map(d => ({ id:d.id, ...d.data() })).sort(byMat);
  localStorage.setItem('cache_buses', JSON.stringify(buses));
  renderAll();
}, err => {
  console.error(err);
  document.getElementById('busGrid').innerHTML = '<div class="empty">Errore caricamento autobus.</div>';
});

onSnapshot(collection(db, 'segnalazioni'), snap => {
  segnalazioni = snap.docs.map(d => ({ id:d.id, ...d.data() }));
  localStorage.setItem('cache_seg', JSON.stringify(segnalazioni));

  const activeEl = document.activeElement;
  const isWritingNote = activeEl && activeEl.classList && activeEl.classList.contains('notes-textarea');

  if (isWritingNote && selectedBus) {
    // Durante la scrittura delle note non ridisegno il dettaglio:
    // altrimenti la textarea viene ricreata e la scheda sembra chiudersi.
    renderBusGrid();
  } else {
    renderAll();
  }
}, err => {
  console.error(err);
  document.getElementById('busGrid').innerHTML = '<div class="empty">Errore caricamento segnalazioni.</div>';
});

try {
  const cb = localStorage.getItem('cache_buses');
  const cs = localStorage.getItem('cache_seg');
  if (cb) buses = JSON.parse(cb);
  if (cs) segnalazioni = JSON.parse(cs);
  renderAll();
} catch(e) {}

window.toggleSettings = function() {
  document.getElementById('settingsMenu').classList.toggle('open');
};

document.addEventListener('click', e => {
  if (!e.target.closest('.settings-wrap')) {
    document.getElementById('settingsMenu').classList.remove('open');
  }
});

window.toggleAddForm = function() {
  const f = document.getElementById('addBusForm');
  f.classList.toggle('open');
  if (f.classList.contains('open')) document.getElementById('inputMatricola').focus();
};

window.addBus = async function() {
  const inp = document.getElementById('inputMatricola');
  const mat = inp.value.trim().toUpperCase();
  if (!mat) return;

  if (buses.some(b => String(b.matricola).toLowerCase() === mat.toLowerCase())) {
    showToast('Matricola già presente');
    return;
  }

  await addDoc(collection(db, 'buses'), { matricola:mat, fuoriServizio:false });
  inp.value = '';
  document.getElementById('addBusForm').classList.remove('open');
  showToast('Autobus aggiunto');
};

document.getElementById('inputMatricola').addEventListener('keydown', e => {
  if (e.key === 'Enter') addBus();
});

function renderBusGrid() {
  const grid = document.getElementById('busGrid');
  if (!grid) return;

  if (!buses.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1">Nessun autobus ancora.</div>';
    return;
  }

  const attivi = buses.filter(b => !b.fuoriServizio);
  const fuori = buses.filter(b => !!b.fuoriServizio);

  function tile(bus, isFuori) {
    const active = segnalazioni.filter(s => s.bus === bus.matricola && !s.pregressa);
    const countHtml = active.length
      ? `<div class="bus-count active">${active.length} ${active.length === 1 ? 'segnalazione' : 'segnalazioni'}</div>`
      : `<div class="bus-count zero">0 segnalazioni</div>`;

    return `
      <button class="bus-tile ${isFuori ? 'fuori-servizio' : ''}" onclick="selectBus('${esc(bus.matricola)}')">
        <div class="bus-card-top">
          <div class="bus-number">${esc(bus.matricola)}</div>
          <svg class="bus-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M7 2h10a4 4 0 0 1 4 4v9a3 3 0 0 1-2 2.83V20a1 1 0 0 1-1 1h-1a1 1 0 0 1-1-1v-2H8v2a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1v-2.17A3 3 0 0 1 3 15V6a4 4 0 0 1 4-4Zm0 2a2 2 0 0 0-2 2v5h14V6a2 2 0 0 0-2-2H7Zm-1 9a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3Zm12 0a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3ZM8 6h8v3H8V6Z"/>
          </svg>
        </div>
        <div class="bus-card-line"></div>
        ${countHtml}
      </button>`;
  }

  let html = '';

  html += '<div class="bus-section-title">In servizio</div>';
  html += '<div class="bus-grid-section">';
  html += attivi.length
    ? attivi.map(b => tile(b, false)).join('')
    : '<div class="empty" style="grid-column:1/-1">Nessun autobus in servizio.</div>';
  html += '</div>';

  if (fuori.length) {
    html += '<div class="bus-section-title">Fuori servizio</div>';
    html += '<div class="bus-grid-section">' + fuori.map(b => tile(b, true)).join('') + '</div>';
  }

  grid.innerHTML = html;
}

window.selectBus = function(mat) {
  selectedBus = mat;
  archiveVisible = false;
  document.getElementById('homeView').style.display = 'none';
  document.getElementById('detailView').classList.add('open');
  showBusDetail(mat);
  forzaScrollInAlto();
  requestAnimationFrame(forzaScrollInAlto);
  setTimeout(forzaScrollInAlto, 80);
};

window.closeDetail = function() {
  selectedBus = null;
  document.getElementById('detailView').classList.remove('open');
  document.getElementById('homeView').style.display = 'block';
  renderBusGrid();
  forzaScrollInAlto();
  requestAnimationFrame(forzaScrollInAlto);
};

function fmtDate(d) {
  if (!d) return '';
  const p = String(d).split('-');
  return p.length === 3 ? `${p[2]}/${p[1]}/${p[0].slice(-2)}` : esc(d);
}

function normalizeDate(raw) {
  raw = String(raw || '').replace(/\D/g, '').slice(0, 6);
  if (raw.length !== 6) return null;

  const day = raw.slice(0, 2);
  const month = raw.slice(2, 4);
  const year = '20' + raw.slice(4, 6);
  const dt = new Date(+year, +month - 1, +day);

  if (dt.getFullYear() !== +year || dt.getMonth() !== +month - 1 || dt.getDate() !== +day) {
    return null;
  }

  return `${year}-${month}-${day}`;
}

function renderDateColumns(dates, segId) {
  const sorted = [...dates].sort();
  const total = sorted.length;
  const usedIndexes = new Set();

  function originalIndexFor(dateValue) {
    let idx = dates.findIndex((v, i) => v === dateValue && !usedIndexes.has(i));
    if (idx < 0) idx = dates.indexOf(dateValue);
    usedIndexes.add(idx);
    return idx;
  }

  function renderItem(item) {
    return `
      <span class="date-tag">
        <span class="date-main">
          <span class="date-num">${item.num}.</span>
          <span class="date-value">${fmtDate(item.date)}</span>
        </span>
        <span class="date-x" onclick="rimuoviData('${segId}',${item.originalIndex})">✕</span>
      </span>`;
  }

  if (total <= 4) {
    const items = sorted.map((d, i) => ({
      date: d,
      num: i + 1,
      originalIndex: originalIndexFor(d)
    }));

    return `
      <div class="date-columns date-columns-single">
        <div class="date-column">
          ${items.map(renderItem).join('')}
        </div>
      </div>`;
  }

  const leftCount = Math.ceil(total / 2);
  const left = [];
  const right = [];

  sorted.forEach((d, i) => {
    const item = {
      date: d,
      num: i + 1,
      originalIndex: originalIndexFor(d)
    };

    if (i < leftCount) left.push(item);
    else right.push(item);
  });

  return `
    <div class="date-columns">
      <div class="date-column">${left.map(renderItem).join('')}</div>
      <div class="date-column">${right.map(renderItem).join('')}</div>
    </div>`;
}


function renderSeg(s, pregressa = false) {
  const dates = Array.isArray(s.date) ? s.date : [];
  const datesHtml = dates.length
    ? renderDateColumns(dates, s.id)
    : '<div class="date-columns"><div class="date-column"><span class="date-tag">Nessuna data registrata</span></div><div></div><div></div></div>';

  return `
    <details class="seg-card ${pregressa ? 'pregressa' : ''}" id="seg-${s.id}" ${openSegIds.has(s.id) ? 'open' : ''} ontoggle="trackSegOpen(\'${s.id}\', this)">
      <summary>
        <span class="seg-title-wrap">
          <span class="seg-dot"></span>
          <span class="seg-title-text">
            <span class="seg-desc">${esc(s.desc)}</span>
            <span class="seg-count-preview">Segnalato <strong>${dates.length}</strong> ${dates.length === 1 ? 'volta' : 'volte'}</span>
          </span>
        </span>
        <span class="chev"><span class="closed">▾</span><span class="open">▴</span></span>
      </summary>

      <div class="seg-body">
        ${datesHtml}

        ${!pregressa ? `
          <div class="date-add-row">
            <span class="date-plus">+</span>
            <input class="date-input" id="date-${s.id}" placeholder="GGMMAA" maxlength="8" inputmode="numeric" oninput="autoSaveDate('${s.id}',this)">
          </div>` : ''}

        <div class="seg-actions">
          ${!pregressa ? `
            <button class="small-action" onclick="moveSeg('${s.id}',-1)">↑</button>
            <button class="small-action" onclick="moveSeg('${s.id}',1)">↓</button>
            <button class="small-action archive" onclick="archiviaSeg('${s.id}')">Archivio</button>
          ` : `
            <button class="small-action restore" onclick="ripristinaSeg('${s.id}')">Ripristina</button>
          `}
          <button class="small-action notes ${String(s.note || '').trim() ? 'has-note' : ''}" onclick="toggleNote('${s.id}')">📝 Note${String(s.note || '').trim() ? ' (1)' : ''}</button>
          <button class="small-action icon" onclick="editSeg('${s.id}')" title="Modifica">✎</button>
          <button class="small-action icon" onclick="deleteSeg('${s.id}')" title="Elimina">🗑</button>
        </div>

        <div class="notes-box ${openNoteIds.has(s.id) ? 'open' : ''}" id="notes-${s.id}">
          <div class="notes-label">Note libere</div>
          <textarea class="notes-textarea" placeholder="Scrivi qui le tue note..." onclick="event.stopPropagation()" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()" oninput="autoSaveNote('${s.id}', this)">${esc(s.note || '')}</textarea>
        </div>
      </div>
    </details>`;
}

function showBusDetail(mat) {
  const bus = buses.find(b => b.matricola === mat);
  document.getElementById('detailNum').textContent = mat;

  const isFuori = !!(bus && bus.fuoriServizio);
  const serviceButtonText = isFuori ? 'Metti in Servizio' : 'Metti in Fuori Servizio';
  const serviceButtonClass = isFuori ? 'btn-service-main in-service' : 'btn-service-main';

  const all = segnalazioni.filter(s => s.bus === mat);
  const active = all.filter(s => !s.pregressa).sort(bySeg);
  const arch = all.filter(s => !!s.pregressa).sort(bySeg);

  let html = '';
  html += active.length
    ? `<div class="seg-list">${active.map(s => renderSeg(s, false)).join('')}</div>`
    : '<div class="empty">Nessuna anomalia attiva per questo autobus.</div>';

  if (archiveVisible) {
    html += `
      <div class="archive-box">
        <div class="archive-title">Vecchie segnalazioni</div>
        ${arch.length ? `<div class="seg-list">${arch.map(s => renderSeg(s, true)).join('')}</div>` : '<div class="empty">Archivio vuoto.</div>'}
      </div>`;
  }

  html += `
    <div class="detail-main-actions">
      <button class="btn-primary" onclick="openModal('${esc(mat)}')">+ Aggiungi segnalazione</button>
      <button class="btn-yellow-main" onclick="togglePregresse()">Vecchie segnalazioni (${arch.length})</button>
      <button class="${serviceButtonClass}" onclick="toggleFuoriServizio()">${serviceButtonText}</button>
      <button class="btn-share-main" onclick="openShareModal()">📤 Condividi anomalie</button>
    </div>`;

  document.getElementById('detailContent').innerHTML = html;
}

window.togglePregresse = function() {
  archiveVisible = !archiveVisible;
  if (selectedBus) showBusDetail(selectedBus);
};

window.openModal = function(mat) {
  currentBusForModal = mat;
  editingSegId = null;
  document.getElementById('modalTitle').textContent = 'NUOVA SEGNALAZIONE';
  document.getElementById('formDesc').value = '';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('formDesc').focus(), 80);
};

window.closeModal = function() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingSegId = null;
};

window.saveSegnalazione = async function() {
  const desc = document.getElementById('formDesc').value.trim();
  if (!desc) {
    alert('Inserisci una descrizione.');
    return;
  }

  if (editingSegId) {
    await updateDoc(doc(db, 'segnalazioni', editingSegId), { desc });
    showToast('Segnalazione aggiornata');
  } else {
    await addDoc(collection(db, 'segnalazioni'), {
      bus:currentBusForModal,
      desc,
      stato:'aperta',
      pregressa:false,
      standby:false,
      note:'',
      createdAt:new Date().toISOString()
    });
    showToast('Segnalazione salvata');
  }

  closeModal();
};

window.editSeg = function(id) {
  const s = segnalazioni.find(x => x.id === id);
  if (!s) return;

  editingSegId = id;
  currentBusForModal = s.bus;
  document.getElementById('modalTitle').textContent = 'MODIFICA SEGNALAZIONE';
  document.getElementById('formDesc').value = s.desc || '';
  document.getElementById('modalOverlay').classList.add('open');
};

window.deleteSeg = async function(id) {
  const ok = confirm("Eliminare questa anomalia?\n\nL'operazione eliminerà l'anomalia e tutte le date associate.");
  if (!ok) return;

  await deleteDoc(doc(db, 'segnalazioni', id));
  showToast('Anomalia eliminata');
};

window.archiviaSeg = async function(id) {
  const ok = confirm("Spostare questa anomalia nelle vecchie segnalazioni?");
  if (!ok) return;

  await updateDoc(doc(db, 'segnalazioni', id), { pregressa:true, standby:false });
  archiveVisible = true;
  showToast('Spostata in archivio');
};

window.ripristinaSeg = async function(id) {
  await updateDoc(doc(db, 'segnalazioni', id), { pregressa:false, standby:false });
  showToast('Anomalia ripristinata');
};


window.trackSegOpen = function(id, el) {
  if (el && el.open) {
    openSegIds.add(id);
  } else {
    openSegIds.delete(id);
    openNoteIds.delete(id);
  }
};

window.toggleNote = function(id) {
  const seg = document.getElementById('seg-' + id);
  if (seg) {
    seg.open = true;
    openSegIds.add(id);
  }

  const box = document.getElementById('notes-' + id);
  if (!box) return;

  box.classList.toggle('open');

  if (box.classList.contains('open')) {
    openNoteIds.add(id);
  } else {
    openNoteIds.delete(id);
  }

  const txt = box.querySelector('textarea');
  if (box.classList.contains('open') && txt) {
    setTimeout(() => txt.focus(), 50);
  }
};

let noteTimers = {};
window.autoSaveNote = function(id, textarea) {
  openSegIds.add(id);
  openNoteIds.add(id);

  const local = segnalazioni.find(x => x.id === id);
  if (local) local.note = textarea.value;

  clearTimeout(noteTimers[id]);
  noteTimers[id] = setTimeout(async () => {
    try {
      await updateDoc(doc(db, 'segnalazioni', id), { note:textarea.value });
    } catch(e) {
      console.error(e);
      showToast('Errore salvataggio note');
    }
  }, 900);
};

window.autoSaveDate = async function(id, input) {
  const raw = input.value.replace(/\D/g, '').slice(0, 6);
  input.value = raw.length <= 2
    ? raw
    : (raw.length <= 4 ? raw.slice(0,2) + '/' + raw.slice(2) : raw.slice(0,2) + '/' + raw.slice(2,4) + '/' + raw.slice(4));

  if (raw.length !== 6) return;

  const data = normalizeDate(raw);
  if (!data) {
    showToast('Data non valida');
    input.value = '';
    return;
  }

  const s = segnalazioni.find(x => x.id === id);
  if (!s) return;

  const dates = Array.isArray(s.date) ? [...s.date] : [];
  dates.push(data);
  dates.sort();

  await updateDoc(doc(db, 'segnalazioni', id), { date:dates });
  showToast('Data registrata');

  setTimeout(() => {
    openSegIds.add(id);
    const el = document.getElementById('seg-' + id);
    if (el) el.open = true;
  }, 80);
};

window.rimuoviData = async function(id, idx) {
  const s = segnalazioni.find(x => x.id === id);
  if (!s || !Array.isArray(s.date)) return;
  if (!confirm('Eliminare questa data?')) return;

  const dates = s.date.filter((_, i) => i !== idx);
  await updateDoc(doc(db, 'segnalazioni', id), { date:dates });
};

window.moveSeg = async function(id, dir) {
  if (!selectedBus) return;

  const list = segnalazioni.filter(s => s.bus === selectedBus && !s.pregressa).sort(bySeg);
  const idx = list.findIndex(s => s.id === id);
  const target = idx + dir;

  if (idx < 0 || target < 0 || target >= list.length) return;

  const reordered = list.slice();
  const item = reordered.splice(idx, 1)[0];
  reordered.splice(target, 0, item);

  await Promise.all(reordered.map((s, i) => updateDoc(doc(db, 'segnalazioni', s.id), { order:i })));
};

window.toggleFuoriServizio = async function() {
  if (!selectedBus) return;

  const bus = buses.find(b => b.matricola === selectedBus);
  if (!bus) return;

  await updateDoc(doc(db, 'buses', bus.id), { fuoriServizio:!bus.fuoriServizio });
};


function testoCondivisioneAnomalie(bus, anomalie) {
  const righe = anomalie
    .map(a => {
      const desc = String(a.desc || '').trim();
      const count = Array.isArray(a.date) ? a.date.length : 0;
      const volte = count === 1 ? 'segnalato 1 volta' : 'segnalato ' + count + ' volte';
      return desc ? '• ' + desc + ' (' + volte + ')' : '';
    })
    .filter(Boolean);

  return bus + '\n\n'
    + 'Verifica e nel caso segnala:\n\n'
    + righe.join('\n\n')
    + '\n\nGrazie';
}

async function condividiTesto(text) {
  try {
    if (navigator.share) {
      await navigator.share({ text });
      return;
    }
  } catch(e) {
    if (e && (e.name === 'AbortError' || e.name === 'NotAllowedError')) return;
  }

  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
      showToast('Testo copiato');
      return;
    }
  } catch(e) {}

  alert(text);
}

window.openShareModal = function() {
  if (!selectedBus) return;

  const active = segnalazioni
    .filter(s => s.bus === selectedBus && !s.pregressa)
    .sort(bySeg);

  const list = document.getElementById('shareList');

  if (!active.length) {
    list.innerHTML = '<div class="empty">Nessuna anomalia attiva da condividere.</div>';
  } else {
    list.innerHTML = active.map(s => `
      <label class="share-item">
        <input type="checkbox" class="share-check" value="${esc(s.id)}">
        <span>${esc(s.desc)}</span>
      </label>
    `).join('');
  }

  document.getElementById('shareModalOverlay').classList.add('open');
};

window.closeShareModal = function() {
  document.getElementById('shareModalOverlay').classList.remove('open');
};

window.selezionaTutteAnomalie = function() {
  document.querySelectorAll('.share-check').forEach(c => c.checked = true);
};

window.deselezionaTutteAnomalie = function() {
  document.querySelectorAll('.share-check').forEach(c => c.checked = false);
};

window.condividiAnomalieSelezionate = async function() {
  if (!selectedBus) return;

  const ids = Array.from(document.querySelectorAll('.share-check:checked')).map(c => c.value);
  if (!ids.length) {
    showToast('Seleziona almeno una anomalia');
    return;
  }

  const selected = segnalazioni
    .filter(s => ids.includes(s.id))
    .sort(bySeg);

  const text = testoCondivisioneAnomalie(selectedBus, selected);
  await condividiTesto(text);
  closeShareModal();
};


window.esportaDati = function() {
  const data = {
    buses:buses.map(b => ({ matricola:b.matricola, fuoriServizio:!!b.fuoriServizio })),
    segnalazioni
  };

  const blob = new Blob([JSON.stringify(data, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'gestione-bus-dati.json';
  a.click();
  URL.revokeObjectURL(url);
};

window.importaDati = async function(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!confirm('Importare i dati? I dati attuali verranno sostituiti.')) return;

      const oldB = await getDocs(collection(db, 'buses'));
      for (const d of oldB.docs) await deleteDoc(doc(db, 'buses', d.id));

      const oldS = await getDocs(collection(db, 'segnalazioni'));
      for (const d of oldS.docs) await deleteDoc(doc(db, 'segnalazioni', d.id));

      for (const item of data.buses || []) {
        const mat = typeof item === 'string' ? item : item.matricola;
        if (mat) await addDoc(collection(db, 'buses'), { matricola:mat, fuoriServizio:!!item.fuoriServizio });
      }

      for (const seg of data.segnalazioni || []) {
        const { id, ...rest } = seg;
        await addDoc(collection(db, 'segnalazioni'), rest);
      }

      showToast('Dati importati');
    } catch(err) {
      alert('File non valido');
    }
  };

  reader.readAsText(file);
};
</script>
</body>
</html>
