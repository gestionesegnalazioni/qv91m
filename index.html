<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<style>* { max-width: 100% !important; } body { overflow-x: hidden !important; }
  /* PASSWORD */
  .pwd-screen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 9999; gap: 24px;
  }
  .pwd-screen.hidden { display: none; }
  .pwd-title { font-family: var(--font-mono); font-size: 1rem; color: var(--accent); letter-spacing: 2px; }
  .pwd-dots { display: flex; gap: 16px; }
  .pwd-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--border); background: none; transition: background 0.15s; }
  .pwd-dot.filled { background: var(--accent); border-color: var(--accent); }
  .pwd-grid { display: grid; grid-template-columns: repeat(3, 72px); gap: 12px; }
  .pwd-btn {
    width: 72px; height: 72px; border-radius: 50%; background: var(--card);
    border: 1px solid var(--border); color: var(--text); font-family: var(--font-mono);
    font-size: 1.3rem; cursor: pointer; transition: all 0.15s;
  }
  .pwd-btn:hover { border-color: var(--accent); color: var(--accent); }
  .pwd-clear {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 8px; padding: 8px 16px; font-family: var(--font-mono);
    font-size: 0.78rem; cursor: pointer; letter-spacing: 0.5px;
  }
  .pwd-clear:hover { border-color: var(--accent); color: var(--accent); }
  .pwd-error { color: var(--red); font-family: var(--font-mono); font-size: 0.8rem; opacity: 0; transition: opacity 0.2s; }
  .pwd-error.show { opacity: 1; }

  /* RIFINITURA RIORDINO: scheda sollevata e trascinabile quasi ovunque */
  .anomalia-main {
    touch-action: pan-y;
    -webkit-user-select: none;
    user-select: none;
  }
  .anomalia-main:active {
    -webkit-tap-highlight-color: transparent;
  }
  .touch-dragging-card {
    background: linear-gradient(145deg, rgba(255,255,255,0.13), rgba(255,255,255,0.055)) !important;
    box-shadow: 0 28px 70px rgba(0,0,0,.72) !important;
    opacity: .99 !important;
    border-color: rgba(255,255,255,.22) !important;
    will-change: transform;
  }
  .anomalia-placeholder {
    transition: transform 180ms cubic-bezier(.2,0,0,1), height 160ms ease;
  }


  /* FUORI SERVIZIO */
  .bus-section-title {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 18px 0 10px;
  }
  .bus-grid-section {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    width: 100%;
    grid-column: 1 / -1;
  }
  .bus-tile.fuori-servizio {
    border-color: rgba(59,130,246,0.85) !important;
    box-shadow: 0 14px 40px rgba(59,130,246,0.10);
  }
  .bus-tile.fuori-servizio .bus-number { color: #93c5fd; }
  .bus-fuori-label {
    font-size: 0.68rem;
    color: #93c5fd;
    font-family: var(--font-mono);
    margin-top: 6px;
  }
  .bus-detail-actions {
    display:flex;
    flex-direction:column;
    gap:8px;
    align-items:flex-end;
  }
  .btn-delete-bus, .btn-fuori-servizio {
    background:none;
    width:132px;
    height:34px;
    padding:0 10px;
    border-radius:8px;
    cursor:pointer;
    font-size:0.78rem;
    font-family:var(--font-mono);
    transition:none;
    text-align:center;
    display:flex;
    align-items:center;
    justify-content:center;
    line-height:1;
    box-sizing:border-box;
    white-space:nowrap;
  }
  .btn-delete-bus { border:1px solid rgba(239,68,68,0.55); color:var(--red); }
  .btn-fuori-servizio { border:1px solid rgba(59,130,246,0.72); color:#93c5fd; }
  .btn-fuori-servizio.in-servizio { border-color: rgba(34,197,94,0.72); color:#86efac; }

</style>
<title>Gestione Segnalazioni Autobus</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
  :root {
    --bg: #0e0f13;
    --panel: #16181f;
    --card: #1c1f2a;
    --border: #2a2d3a;
    --accent: #f0c040;
    --red: #ef4444;
    --green: #22c55e;
    --orange: #f97316;
    --text: #e8eaf0;
    --muted: #6b7280;
    --font-mono: 'Space Mono', monospace;
    --font-sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; overflow-x: hidden; max-width: 100vw; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-sans); min-height: 100vh; display: flex; flex-direction: column; }

  header {
    display: flex; align-items: center; justify-content: flex-end;
    padding: 18px 24px; border-bottom: 1px solid var(--border);
    background: var(--panel); position: sticky; top: 0; z-index: 100;
    width: 100%; max-width: 100vw; overflow: hidden;
  }
  .logo { font-family: var(--font-mono); font-size: 1.1rem; color: var(--accent); letter-spacing: 2px; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .header-date { font-family: var(--font-mono); font-size: 0.75rem; color: var(--muted); }

  .wrapper { width: 100%; max-width: 640px; margin: 0 auto; padding: 24px 16px 60px; overflow: hidden; }

  /* STAT */
  .stats-bar { margin-bottom: 24px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; display: inline-flex; flex-direction: column; gap: 6px; min-width: 160px; }
  .stat-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-family: var(--font-mono); }
  .stat-value { font-size: 2rem; font-weight: 600; font-family: var(--font-mono); line-height: 1; color: var(--green); }

  /* ADD BUS */
  .add-bus-area { margin-bottom: 20px; }
  .btn-aggiungi-autobus { background: var(--green); color: #000; border: none; border-radius: 8px; padding: 11px 22px; font-family: var(--font-mono); font-weight: 700; font-size: 0.82rem; cursor: pointer; letter-spacing: 0.5px; transition: opacity 0.15s; }
  .btn-aggiungi-autobus:hover { opacity: 0.85; }
  .add-bus-form { display: none; margin-top: 12px; background: var(--card); border: 1px solid var(--accent); border-radius: 10px; padding: 16px; flex-direction: row; align-items: flex-end; gap: 10px; flex-wrap: wrap; }
  .add-bus-form.open { display: flex; }
  .add-bus-form .field { display: flex; flex-direction: column; gap: 5px; }
  .add-bus-form label { font-family: var(--font-mono); font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .add-bus-input { background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 10px 16px; border-radius: 8px; font-family: var(--font-mono); font-size: 0.9rem; outline: none; transition: border-color 0.15s; width: 220px; }
  .add-bus-input::placeholder { color: var(--muted); }
  .add-bus-input:focus { border-color: var(--accent); }
  .btn-save-bus { background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 10px 18px; font-family: var(--font-mono); font-weight: 700; font-size: 0.78rem; cursor: pointer; transition: opacity 0.15s; }
  .btn-save-bus:hover { opacity: 0.85; }
  .btn-cancel-bus { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 10px 14px; font-family: var(--font-mono); font-size: 0.78rem; cursor: pointer; }
  .btn-cancel-bus:hover { color: var(--text); border-color: var(--muted); }

  /* BUS GRID */
  .bus-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-bottom: 24px; width: 100%; }
  .bus-tile { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 12px; cursor: pointer; transition: all 0.15s; width: 100%; overflow: hidden; }
  .bus-tile:hover { border-color: var(--accent); transform: translateY(-2px); }
  .bus-tile.has-issues { }
  .bus-number { font-family: var(--font-mono); font-size: 0.95rem; font-weight: 700; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bus-count { font-size: 0.75rem; color: var(--muted); display: flex; align-items: center; gap: 5px; }
  .dot-red { display: none; }

  /* BUS DETAIL */
  .bus-detail { background: var(--card); border: 1px solid var(--green); border-radius: 12px; padding: 16px; margin-bottom: 20px; display: none; width: 100%; overflow: hidden; max-width: 100%; }
  .bus-detail.open { display: block; }
  .bus-detail-num { font-family: var(--font-mono); font-size: 1.3rem; font-weight: 700; color: var(--green); margin-bottom: 14px; }

  /* BACK BUTTON */
  .btn-back { background: none; border: none; color: var(--green); font-family: var(--font-mono); font-size: 0.85rem; cursor: pointer; padding: 0; display: flex; align-items: center; gap: 8px; transition: opacity 0.15s; }
  .btn-back:hover { opacity: 0.75; }

  /* SEGNALAZIONE ROW */
  .seg-row { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 10px; width: 100%; overflow: hidden; }
  .seg-row-desc { flex: 1; font-size: 0.88rem; font-weight: 500; overflow: hidden; white-space: normal; word-break: break-word; }
  .seg-btns { display: flex; gap: 6px; flex-shrink: 0; }
  .btn-edit { background: none; border: 1px solid var(--border); color: var(--muted); padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-family: var(--font-mono); transition: all 0.15s; white-space: nowrap; }
  .btn-edit:hover { color: var(--text); border-color: var(--muted); }
  .btn-del { background: none; border: 1px solid var(--border); color: var(--muted); padding: 4px 8px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; transition: all 0.15s; }
  .btn-del:hover { color: var(--red); border-color: var(--red); }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-family: var(--font-mono); font-size: 0.95rem; color: var(--accent); margin-bottom: 20px; letter-spacing: 1px; }
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-family: var(--font-mono); margin-bottom: 6px; }
  .form-control { width: 100%; background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; font-family: var(--font-sans); font-size: 0.9rem; outline: none; transition: border-color 0.15s; }
  .form-control:focus { border-color: var(--accent); }
  textarea.form-control { resize: vertical; min-height: 100px; }
  .btn-primary { background: var(--accent); color: #000; border: none; padding: 10px 22px; border-radius: 8px; font-weight: 700; font-family: var(--font-sans); font-size: 0.9rem; cursor: pointer; transition: opacity 0.15s; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-ghost { background: none; border: 1px solid var(--border); color: var(--muted); padding: 10px 18px; border-radius: 8px; font-family: var(--font-sans); font-size: 0.9rem; cursor: pointer; transition: all 0.15s; }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  /* SETTINGS */
  .settings-wrap { position: relative; }
  .btn-gear { background: none; border: 1px solid var(--border); color: var(--muted); width: 36px; height: 36px; border-radius: 50%; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .btn-gear:hover { border-color: var(--accent); color: var(--accent); }
  .settings-menu { display: none; position: fixed; right: 16px; top: 70px; background: var(--panel); border: 1px solid var(--accent); border-radius: 10px; padding: 8px; min-width: 180px; z-index: 9999; box-shadow: 0 8px 24px rgba(0,0,0,0.6); }
  .settings-menu.open { display: block; }
  .settings-btn { width: 100%; background: none; border: none; color: var(--text); padding: 10px 14px; text-align: left; cursor: pointer; font-family: var(--font-mono); font-size: 0.75rem; border-radius: 6px; transition: background 0.15s; }
  .settings-btn:hover { background: var(--card); }
  .settings-divider { height: 1px; background: var(--border); margin: 4px 0; }

  /* LOADING */
  .loading { text-align: center; padding: 40px; color: var(--muted); font-family: var(--font-mono); font-size: 0.82rem; }

  /* EMPTY */
  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }
  .empty-state p { font-size: 0.88rem; }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--green); color: #000; padding: 10px 18px; border-radius: 8px; font-weight: 600; font-size: 0.82rem; z-index: 400; display: none; }



  /* RESTYLING GESTIONE BUS 2.0 */
  :root {
    --bg: #080b12;
    --panel: rgba(16, 22, 35, 0.82);
    --card: rgba(24, 32, 48, 0.78);
    --border: rgba(255,255,255,0.10);
    --accent: #f5c84b;
    --green: #34d399;
    --text: #f4f7fb;
    --muted: #9aa4b2;
  }
  body {
    background: #080b12;
  }
  header {
    background: rgba(8, 11, 18, 0.72);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .wrapper { max-width: 720px; padding-top: 20px; }
  .stat-card, .add-bus-form, .bus-tile, .bus-detail, .modal, .seg-row {
    background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.035));
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 14px 40px rgba(0,0,0,0.24);
    backdrop-filter: blur(16px);
  }
  .stat-card { border-radius: 20px; min-width: 100%; padding: 18px 20px; }
  .stat-label { color: var(--muted); }
  .stat-value { color: var(--green); font-size: 2.3rem; }
  .bus-grid { grid-template-columns: repeat(auto-fill, minmax(132px, 1fr)); gap: 12px; }
  .bus-tile { border-radius: 20px; padding: 18px 14px; min-height: 82px; }
  .bus-tile:hover { transform: translateY(-3px) scale(1.01); border-color: rgba(245,200,75,0.55); }
  .bus-number { font-size: 1.08rem; margin-bottom: 8px; }
  .bus-count { color: var(--green); font-weight: 600; }
  .bus-detail { border-radius: 24px; border-color: rgba(255,255,255,0.12); padding: 18px; }
  .bus-detail.open { animation: riseIn .22s ease-out; }
  .bus-detail-num { font-size: 1.65rem; letter-spacing: 1px; }
  .seg-row { border-radius: 18px; padding: 14px; margin-bottom: 12px; }
  .seg-row-desc { font-size: 0.95rem; line-height: 1.35; }
  .anomalia-line { display:flex; align-items:flex-start; gap:10px; width:100%; }
  .anomalia-dot { width:9px; height:9px; border-radius:50%; background:var(--red); flex:0 0 9px; margin-top:7px; box-shadow:0 0 0 4px rgba(239,68,68,0.12); }
  .seg-actions { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:10px; padding-top:8px; border-top:1px solid rgba(255,255,255,0.08); }
  .btn-aggiungi-autobus, .btn-primary, .btn-save-bus {
    border-radius: 999px;
    box-shadow: 0 10px 26px rgba(52,211,153,0.18);
  }
  .btn-edit, .btn-del, .btn-ghost, .btn-cancel-bus { border-radius: 999px; }
  .form-control, .add-bus-input { border-radius: 14px; }
  .pwd-screen {
    background:
      radial-gradient(circle at center top, rgba(245,200,75,0.16), transparent 38%),
      #080b12;
  }
  .pwd-btn { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.14); }
  @keyframes riseIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 480px) {
    .add-bus-input { width: 100%; }
    .header-date { font-size: 0.65rem; }
  }

  /* DISABILITA PIN */
  #pwdScreen { display: none !important; }

  /* AZIONI MINIMALI SEGNALAZIONE */
  .icon-action {
    width: 28px;
    height: 24px;
    border: 1px solid rgba(255,255,255,0.14);
    background: transparent;
    color: var(--muted);
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .icon-action:hover {
    color: var(--text);
    border-color: rgba(255,255,255,0.28);
    background: rgba(255,255,255,0.05);
  }

  .icon-action.reorder-action {
    font-family: var(--font-mono);
    font-size: 0.78rem;
    line-height: 1;
    font-weight: 700;
  }

  .icon-action svg {
    width: 11px;
    height: 11px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .date-plus {
    color: var(--green);
    font-family: var(--font-mono);
    font-size: 1rem;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
  }
  .date-input-single {
    width: 86px;
    background: var(--panel);
    border: 1px dashed var(--border);
    color: var(--text);
    padding: 5px 8px;
    border-radius: 9px;
    font-size: 0.78rem;
    font-family: var(--font-mono);
    text-align: center;
    letter-spacing: 1px;
    outline: none;
  }
  .date-input-single:focus { border-color: var(--green); }
  .anomalia-dot {
    width: 7px !important;
    height: 7px !important;
    border-radius: 50% !important;
    background: var(--muted) !important;
    box-shadow: none !important;
    flex: 0 0 7px !important;
    margin-top: 7px !important;
    opacity: 0.95;
  }
  .date-details summary {
    list-style: none;
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    width: 100%;
  }
  .date-details summary::-webkit-details-marker { display: none; }
  .date-toggle {
    color: var(--muted);
    font-size: 0.58rem;
    line-height: 1.05;
    font-family: var(--font-mono);
    white-space: nowrap;
    padding: 4px 7px;
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 999px;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 50px;
    min-height: 28px;
    background: transparent;
    transition: none;
  }
  .date-details summary:hover .date-toggle,
  .date-details[open] .date-toggle {
    color: var(--muted);
    border-color: rgba(255,255,255,0.14);
    background: transparent;
  }
  .date-details[open] .toggle-closed { display: none; }
  .date-details:not([open]) .toggle-open { display: none; }

  /* MODIFICHE UI: scheda autobus senza cornice e pulsante date su due righe */
  .bus-detail {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
    backdrop-filter: none !important;
    padding: 0 !important;
    border-radius: 0 !important;
  }
  .bus-detail.open { animation: none !important; }
  .toggle-closed, .toggle-open {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
  }
  .date-details:not([open]) .toggle-closed { display: flex !important; }
  .date-details[open] .toggle-open { display: flex !important; }
  .date-details[open] .toggle-closed { display: none !important; }
  .date-details:not([open]) .toggle-open { display: none !important; }



  /* PIANO BUS */
  .piano-bus-area {
    margin-bottom: 20px;
    background: linear-gradient(145deg, rgba(255,255,255,0.07), rgba(255,255,255,0.03));
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 20px;
    padding: 14px;
    box-shadow: 0 14px 40px rgba(0,0,0,0.18);
    backdrop-filter: blur(16px);
  }
  .piano-bus-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; }
  .piano-bus-title { font-family:var(--font-mono); color:var(--text); font-size:0.82rem; letter-spacing:0.5px; }
  .piano-bus-sub { color:var(--muted); font-size:0.76rem; line-height:1.35; margin-bottom:10px; }
  .piano-bus-actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .piano-bus-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.14);
    color: var(--muted);
    border-radius: 999px;
    padding: 8px 12px;
    font-size: 0.72rem;
    font-family: var(--font-mono);
    cursor: pointer;
  }

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBdwNH43PZFgSfKZOEfJtBrF-ooC4NOnGc",
  authDomain: "gestionesegnalazioni.firebaseapp.com",
  projectId: "gestionesegnalazioni",
  storageBucket: "gestionesegnalazioni.firebasestorage.app",
  messagingSenderId: "930504240088",
  appId: "1:930504240088:web:60e43f95f82883b43b20ad",
  measurementId: "G-59G37GQX9J"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let buses = [];
let segnalazioni = [];
let selectedBus = null;
let editingSegId = null;
let currentBusForModal = null;
let openDateDetailsIds = new Set();
let openAnomaliaIds = new Set();
let isRenderingDetail = false;

function markSegnalazioneAperta(id) {
  openAnomaliaIds.add(id);
  openDateDetailsIds.add(id);
  try {
    sessionStorage.setItem('anomalia-open-' + id, '1');
    sessionStorage.setItem('dates-open-' + id, '1');
  } catch(e) {}
}

function isSegnalazioneAperta(id) {
  try { if (sessionStorage.getItem('anomalia-open-' + id) === '1') return true; } catch(e) {}
  return openAnomaliaIds.has(id) || openDateDetailsIds.has(id);
}

function areDateAperte(id) {
  try { if (sessionStorage.getItem('dates-open-' + id) === '1') return true; } catch(e) {}
  return openDateDetailsIds.has(id);
}

// PASSWORD
const CORRECT = '8400';
let pwdInput = '';

window.pwdPress = function(val) {
  if (val === 'C') {
    pwdInput = '';
  } else {
    if (pwdInput.length < 4) pwdInput += val;
    if (pwdInput.length === 4) {
      if (pwdInput === CORRECT) {
        document.getElementById('pwdScreen').classList.add('hidden');
      } else {
        document.getElementById('pwdError').classList.add('show');
        setTimeout(() => document.getElementById('pwdError').classList.remove('show'), 1500);
        pwdInput = '';
      }
    }
  }

  for (let i = 0; i < 4; i++) {
    document.getElementById('dot' + i).classList.toggle('filled', i < pwdInput.length);
  }
};

// Richiedi sempre il PIN a ogni apertura dell'app
localStorage.removeItem('auth');


document.getElementById('headerDate').textContent = new Date().toLocaleDateString('it-IT', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

// LOAD CACHE IMMEDIATELY
const cachedBuses = localStorage.getItem('cache_buses');
const cachedSeg = localStorage.getItem('cache_seg');
if (cachedBuses) { buses = JSON.parse(cachedBuses); renderAll(); }
if (cachedSeg) { segnalazioni = JSON.parse(cachedSeg); renderAll(); }

// REALTIME LISTENERS
onSnapshot(collection(db, 'buses'), snap => {
  buses = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  buses.sort((a, b) => a.matricola.localeCompare(b.matricola));
  localStorage.setItem('cache_buses', JSON.stringify(buses));
  renderAll();
});

onSnapshot(collection(db, 'segnalazioni'), snap => {
  segnalazioni = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  localStorage.setItem('cache_seg', JSON.stringify(segnalazioni));
  renderAll();
  if (selectedBus) showBusDetail(selectedBus);
});

// SETTINGS
window.toggleSettings = function() {
  document.getElementById('settingsMenu').classList.toggle('open');
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.settings-wrap')) {
    document.getElementById('settingsMenu').classList.remove('open');
  }
});

window.esportaDati = function() {
  const data = { buses: buses.map(b => ({ matricola: b.matricola, fuoriServizio: !!b.fuoriServizio })), segnalazioni };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'autobus-dati.json'; a.click();
  URL.revokeObjectURL(url);
  document.getElementById('settingsMenu').classList.remove('open');
  showToast('Dati esportati!');
}

window.importaDati = async function(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      const data = JSON.parse(e.target.result);
      // Delete all existing buses
      const existingBuses = await getDocs(collection(db, 'buses'));
      for (const d of existingBuses.docs) await deleteDoc(doc(db, 'buses', d.id));
      // Delete all existing segnalazioni
      const existingSeg = await getDocs(collection(db, 'segnalazioni'));
      for (const d of existingSeg.docs) await deleteDoc(doc(db, 'segnalazioni', d.id));
      // Import new buses
      if (data.buses) {
        for (const item of data.buses) {
          const mat = typeof item === 'string' ? item : item.matricola;
          if (!mat) continue;
          await addDoc(collection(db, 'buses'), {
            matricola: mat,
            fuoriServizio: typeof item === 'object' ? !!item.fuoriServizio : false
          });
        }
      }
      // Import new segnalazioni
      if (data.segnalazioni) {
        for (const seg of data.segnalazioni) {
          const { id, ...segData } = seg;
          await addDoc(collection(db, 'segnalazioni'), segData);
        }
      }
      document.getElementById('settingsMenu').classList.remove('open');
      showToast('Dati importati!');
    } catch(err) { alert('File non valido!'); }
  };
  reader.readAsText(file);
}

// ADD BUS
window.toggleAddForm = function() {
  const form = document.getElementById('addBusForm');
  const isOpen = form.classList.toggle('open');
  if (isOpen) document.getElementById('inputMatricola').focus();
  else document.getElementById('inputMatricola').value = '';
}

window.addBus = async function() {
  const inp = document.getElementById('inputMatricola');
  const mat = inp.value.trim();
  if (!mat) return;
  if (buses.find(b => b.matricola.toLowerCase() === mat.toLowerCase())) { showToast('Matricola già presente!'); return; }
  await addDoc(collection(db, 'buses'), { matricola: mat, fuoriServizio: false });
  toggleAddForm(); showToast('Autobus aggiunto!');
}
document.getElementById('inputMatricola').addEventListener('keydown', e => { if (e.key === 'Enter') addBus(); });

// MODAL NUOVA
window.openModal = function(mat) {
  currentBusForModal = mat;
  document.getElementById('formDesc').value = '';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('formDesc').focus(), 100);
}
window.closeModal = function() { document.getElementById('modalOverlay').classList.remove('open'); }
window.saveSegnalazione = async function() {
  const desc = document.getElementById('formDesc').value.trim();
  if (!desc) { alert('Inserisci una descrizione.'); return; }
  await addDoc(collection(db, 'segnalazioni'), {
    bus: currentBusForModal, desc, stato: 'aperta', createdAt: new Date().toISOString()
  });
  closeModal(); showToast('Segnalazione salvata!');
}

// MODAL MODIFICA
window.editSeg = function(id) {
  const s = segnalazioni.find(x => x.id === id);
  if (!s) return;
  editingSegId = id;
  document.getElementById('editFormDesc').value = s.desc;
  document.getElementById('editModalOverlay').classList.add('open');
}
window.closeEditModal = function() { document.getElementById('editModalOverlay').classList.remove('open'); editingSegId = null; }
window.saveEditSeg = async function() {
  const desc = document.getElementById('editFormDesc').value.trim();
  if (!desc) { alert('La descrizione non può essere vuota.'); return; }
  await updateDoc(doc(db, 'segnalazioni', editingSegId), { desc });
  closeEditModal(); showToast('Segnalazione aggiornata!');
}

// DELETE
window.deleteSeg = async function(id) {
  const s = segnalazioni.find(x => x.id === id);
  if (!s) return;
  const ok = confirm("Eliminare questa anomalia?\n\nL'operazione eliminerà l'anomalia e tutte le date associate.");
  if (!ok) return;
  const busMat = s.bus;
  await deleteDoc(doc(db, 'segnalazioni', id));
  const remaining = segnalazioni.filter(x => x.bus === busMat && x.id !== id);
  if (remaining.length === 0) {
    const busDoc = buses.find(b => b.matricola === busMat);
    if (busDoc) await deleteDoc(doc(db, 'buses', busDoc.id));
    if (selectedBus === busMat) closeDetail();
  }
}

window.deleteBus = async function() {
  if (!confirm('Eliminare questo autobus e tutte le sue segnalazioni?')) return;
  const busDoc = buses.find(b => b.matricola === selectedBus);
  if (busDoc) await deleteDoc(doc(db, 'buses', busDoc.id));
  const segsToDelete = segnalazioni.filter(s => s.bus === selectedBus);
  for (const s of segsToDelete) await deleteDoc(doc(db, 'segnalazioni', s.id));
  closeDetail(); showToast('Autobus eliminato.');
}

window.toggleFuoriServizio = async function() {
  const busObj = buses.find(b => b.matricola === selectedBus);
  if (!busObj) return;
  const nuovoStato = !busObj.fuoriServizio;
  await updateDoc(doc(db, 'buses', busObj.id), { fuoriServizio: nuovoStato });
  const btn = document.getElementById('btnFuoriServizio');
  if (btn) { btn.textContent = nuovoStato ? 'In servizio' : 'Fuori servizio'; btn.classList.toggle('in-servizio', nuovoStato); }
  renderBusGrid();
}

// RENDER
function renderAll() {
  document.getElementById('stat-total').textContent = buses.length;
  renderBusGrid();
}

function renderBusGrid() {
  const grid = document.getElementById('busGrid');
  if (!buses.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">🚌</div><p>Nessun autobus ancora.<br>Premi "Aggiungi autobus" per iniziare.</p></div>`;
    return;
  }

  const attivi = buses.filter(b => !b.fuoriServizio);
  const fuori = buses.filter(b => !!b.fuoriServizio);

  const makeTile = (bus, isFuori) => {
    const open = segnalazioni.filter(s => s.bus === bus.matricola);
    return `
      <div class="bus-tile ${isFuori ? 'fuori-servizio' : ''}" onclick="selectBus('${bus.matricola.replace(/'/g, "\\'")}')">
        <div class="bus-number">${bus.matricola}</div>
        ${open.length ? `<div class="bus-count">${open.length} ${open.length > 1 ? 'aperte' : 'aperta'}</div>` : ''}
        ${isFuori ? `<div class="bus-fuori-label">Fuori servizio</div>` : ''}
      </div>`;
  };

  let html = '';
  html += `<div class="bus-grid-section">`;
  html += attivi.length
    ? attivi.map(bus => makeTile(bus, false)).join('')
    : `<div class="empty-state" style="grid-column:1/-1;padding:18px 10px;"><p>Nessun autobus in servizio.</p></div>`;
  html += `</div>`;

    html += `<div class="bus-grid-section">` + fuori.map(bus => makeTile(bus, true)).join('') + `</div>`;

}

function showBusDetail(mat) {

  const segs = segnalazioni.filter(s => s.bus === mat).slice().sort((a, b) => {
    const ao = (typeof a.order === 'number') ? a.order : 999999;
    const bo = (typeof b.order === 'number') ? b.order : 999999;
    if (ao !== bo) return ao - bo;
    const ad = a.createdAt ? new Date(a.createdAt).getTime() : 0;
    const bd = b.createdAt ? new Date(b.createdAt).getTime() : 0;
    return bd - ad;
  });
  document.getElementById('detailNum').textContent = mat;
  const busObjDetail = buses.find(b => b.matricola === mat);

          + '<span onclick="rimuoviData(\'' + s.id + '\',' + idx + ')" style="cursor:pointer;color:var(--muted);padding:0 4px;" onmouseover="this.style.color=\'var(--red)\'" onmouseout="this.style.color=\'var(--muted)\'">✕</span>'
          + '</span>';
      };
      const leftHtml = leftDates.map((d, i) => makeDateTag(d, i)).join('');
      const rightHtml = rightDates.map((d, i) => makeDateTag(d, i + half)).join('');
      const countHtml = dates.length === 1
        ? 'Segnalato <strong style="color:var(--red);font-weight:700;">1</strong> volta'
        : 'Segnalato <strong style="color:var(--red);font-weight:700;">' + dates.length + '</strong> volte';
      const dateListHtml = dates.length ? (

        + '<div style="display:flex;flex-direction:column;gap:4px;flex:1;">' + leftHtml + '</div>'
        + (rightDates.length ? '<div style="width:1px;background:var(--border);margin:0 10px;"></div><div style="display:flex;flex-direction:column;gap:4px;flex:1;">' + rightHtml + '</div>' : '')
        + '</div>'
      ) : '<div style="margin-top:8px;font-size:0.75rem;color:var(--muted);font-family:var(--font-mono);">Nessuna data registrata</div>';
      const datesHtml = '<div class="date-block" style="margin-top:8px;">'
        + '<div style="font-size:0.75rem;color:var(--muted);font-family:var(--font-mono);">' + countHtml + '</div>'
        + dateListHtml

      html += `<details id="anomalia-${s.id}" data-id="${s.id}" class="seg-row anomalia-main anomalia-chiusa" style="flex-direction:column;align-items:stretch;" ${isSegnalazioneAperta(s.id) ? 'open' : ''} ontoggle="trackAnomaliaOpen('${s.id}', this)">

          </span>
          <span class="anomalia-chevron" aria-hidden="true"><span class="closed">▾</span><span class="open">▴</span></span>
        </summary>

              <input type="hidden" id="editidx-${s.id}" value="">

            <button class="icon-action" onclick="editSeg('${s.id}')" title="Modifica" aria-label="Modifica">
              <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
            </button>
            <button class="icon-action" onclick="deleteSeg('${s.id}')" title="Elimina" aria-label="Elimina">

    <button class="btn-primary" style="margin-top:16px;font-size:0.82rem;padding:10px 18px;background:var(--green);color:#000;" onclick="openModal('${mat}')">+ Aggiungi segnalazione</button>`;
  document.getElementById('detailContent').innerHTML = html;

  // Ripristino robusto dello stato aperto dopo ogni ridisegno Firebase.
  // Serve soprattutto dopo l'inserimento automatico di una data: Firebase aggiorna
  // i dati e l'app ricostruisce la scheda, ma la stessa anomalia deve restare aperta.
  function ripristinaAperture() {
    segs.forEach(item => {
      const outer = document.getElementById('anomalia-' + item.id);
      const inner = document.getElementById('details-' + item.id);
      if (isSegnalazioneAperta(item.id) && outer) outer.open = true;
      if (areDateAperte(item.id) && inner) inner.open = true;
    });
  }
  panel.classList.add('open');
  ripristinaAperture();
  setTimeout(ripristinaAperture, 50);
  setTimeout(ripristinaAperture, 250);
  // Riordino tramite frecce ↑/↓: niente trascinamento instabile su iPhone.
  setTimeout(() => { isRenderingDetail = false; }, 300);
}

window.autoAdvance = function(input, nextId, len) {
  input.value = input.value.replace(/\D/g, '').slice(0, len);

    document.getElementById(nextId).focus();
  }
}

function formatDateInputValue(value) {
  const raw = (value || '').replace(/\D/g, '').slice(0, 6);
  if (raw.length <= 2) return raw;
  if (raw.length <= 4) return raw.slice(0, 2) + '/' + raw.slice(2);
  return raw.slice(0, 2) + '/' + raw.slice(2, 4) + '/' + raw.slice(4);
}

window.autoSaveSingleDate = function(id, input) {
  const raw = (input.value || '').replace(/\D/g, '').slice(0, 6);
  input.value = formatDateInputValue(raw);
  if (raw.length === 6) {
    aggiungiDataManuale(id);
  }
}

window.editDate = function(id, idx) {
  const s = segnalazioni.find(x => x.id === id);
  if (!s || !s.date || !s.date[idx]) return;
  const [year, month, day] = s.date[idx].split('-');
  const input = document.getElementById('date-' + id);
  input.value = formatDateInputValue(day + month + year.slice(-2));
  openDateDetails(id);
  document.getElementById('editidx-' + id).value = idx;
  input.focus();
  showToast('Modifica la data: si salva automaticamente dopo 6 numeri');
}

window.aggiungiDataManuale = async function(id) {
  const input = document.getElementById('date-' + id);
  const raw = (input.value || '').replace(/\D/g, '').slice(0, 6);
  markSegnalazioneAperta(id);
  openDateDetails(id);

  if (raw.length !== 6) {
    showToast('Inserisci 6 numeri: GGMMAA');
    return;
  }

  const day = raw.slice(0, 2);
  const month = raw.slice(2, 4);
  const yearShort = raw.slice(4, 6);
  const year = '20' + yearShort;

  const d = parseInt(day), m = parseInt(month), y = parseInt(year);
  const candidate = new Date(y, m - 1, d);
  const isRealDate = candidate.getFullYear() === y && candidate.getMonth() === m - 1 && candidate.getDate() === d;
  if (!isRealDate || y < 2000 || y > 2099) {
    showToast('Data non valida!');
    input.value = '';
    input.focus();
    return;
  }

  const data = `${year}-${month}-${day}`;
  const s = segnalazioni.find(x => x.id === id);
  if (!s) return;

  let dates = s.date || [];
  const editIdxField = document.getElementById('editidx-' + id);
  const editIdx = editIdxField.value;

  if (editIdx !== '') {
    dates = [...dates];
    dates[parseInt(editIdx)] = data;
    dates.sort();
    editIdxField.value = '';
    showToast('Data modificata!');
  } else {
    if (dates.includes(data)) {
      showToast('Data già presente!');
      input.value = '';
      input.focus();
      return;
    }
    dates = [...dates, data].sort();
    showToast('Data registrata!');
  }

  // Mantieni aperta la segnalazione e la tendina date anche dopo il refresh Firebase
  markSegnalazioneAperta(id);

  await updateDoc(doc(db, 'segnalazioni', id), { date: dates });

  // Dopo il ridisegno della scheda, riapri e lascia il cursore pronto
  setTimeout(() => {
    openAnomaliaIds.add(id);
    openDateDetailsIds.add(id);
    openDateDetails(id);
    const freshInput = document.getElementById('date-' + id);
    if (freshInput) {
      freshInput.value = '';
      freshInput.focus();
    }
  }, 120);
}


// PIANO BUS OCR - tentativo sperimentale
function normalizzaBusCode(code) {
  return (code || '').toUpperCase().replace(/\s+/g, '').replace(/O/g, '0');
}

function pulisciNomeDaRiga(line, busCode) {
  let cleaned = (line || '').replace(busCode, ' ');
  cleaned = cleaned.replace(/\b[A-Z]{1,3}\s?\d{3,4}\b/g, ' ');
  cleaned = cleaned.replace(/\b\d{1,2}[:.]\d{2}\b/g, ' ');
  cleaned = cleaned.replace(/\b\d{3,6}\b/g, ' ');
  cleaned = cleaned.replace(/\s+/g, ' ').trim();
  const pieces = cleaned.split(' ');
  if (pieces.length > 5) cleaned = pieces.slice(0, 5).join(' ');
  return cleaned || 'Autista non riconosciuto';
}

function estraiAssegnazioniDaOCR(text) {
  const lines = (text || '').split(/\n+/).map(l => l.trim()).filter(Boolean);
  const out = [];
  const busRegex = /\b[AKL]\s?\d{4}\b/gi;
  for (const line of lines) {
    const matches = [...line.matchAll(busRegex)];
    for (const m of matches) {
      const bus = normalizzaBusCode(m[0]);
      const driver = pulisciNomeDaRiga(line, m[0]);
      out.push({ bus, driver, raw: line });
    }
  }
  const seen = new Set();
  return out.filter(x => {
    const key = x.bus + '|' + x.driver;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}


function initAnomalieSortable(mat) {
  const list = document.getElementById('anomalieList');
  if (!list) return;

  if (list._sortable && typeof list._sortable.destroy === 'function') {
    try { list._sortable.destroy(); } catch(e) {}
    list._sortable = null;
  }
  if (list._touchReorderCleanup) {
    try { list._touchReorderCleanup(); } catch(e) {}
  }

  let pressTimer = null;
  let dragging = false;
  let dragged = null;
  let placeholder = null;
  let offsetX = 0;
  let offsetY = 0;
  let startX = 0;
  let startY = 0;
  let currentX = 0;
  let currentY = 0;
  let rafId = null;
  let suppressNextClick = false;
  const cleanups = [];

  function getPoint(e) {
    const t = e.touches && e.touches[0] ? e.touches[0] : (e.changedTouches && e.changedTouches[0] ? e.changedTouches[0] : e);
    return { x: t.clientX, y: t.clientY };
  }

  function isControlTarget(target) {
    return !!(target && target.closest && target.closest('input, textarea, select, button, a, .icon-action'));
  }

  function resetCardStyle(el) {
    if (!el) return;
    el.classList.remove('touch-dragging-card');
    el.style.position = '';
    el.style.left = '';
    el.style.top = '';
    el.style.width = '';
    el.style.height = '';
    el.style.zIndex = '';
    el.style.margin = '';
    el.style.transform = '';
    el.style.transition = '';
  }

  function setDraggedPosition() {
    rafId = null;
    if (!dragging || !dragged) return;
    const x = currentX - offsetX;
    const y = currentY - offsetY;
    dragged.style.transform = `translate3d(${x}px, ${y}px, 0) scale(1.025)`;
  }

  function requestDraggedPosition(point) {
    currentX = point.x;
    currentY = point.y;
    if (!rafId) rafId = requestAnimationFrame(setDraggedPosition);
  }

  function animateListMove(callback) {
    const items = Array.from(list.querySelectorAll('.anomalia-main, .anomalia-placeholder'));
    const first = new Map(items.map(el => [el, el.getBoundingClientRect()]));
    callback();
    const after = Array.from(list.querySelectorAll('.anomalia-main, .anomalia-placeholder'));
    after.forEach(el => {
      if (el === dragged) return;
      const old = first.get(el);
      if (!old) return;
      const now = el.getBoundingClientRect();
      const dx = old.left - now.left;
      const dy = old.top - now.top;
      if (Math.abs(dx) < 1 && Math.abs(dy) < 1) return;
      el.style.transition = 'none';
      el.style.transform = `translate3d(${dx}px, ${dy}px, 0)`;
      requestAnimationFrame(() => {
        el.style.transition = 'transform 180ms cubic-bezier(.2,0,0,1)';
        el.style.transform = '';
      });
    });
  }

  async function persistOrder() {
    const ids = Array.from(list.querySelectorAll('.anomalia-main[data-id]')).map(el => el.getAttribute('data-id'));
    for (let i = 0; i < ids.length; i++) {
      const s = segnalazioni.find(x => x.id === ids[i]);
      if (s && s.order !== i) {
        s.order = i;
        try { await updateDoc(doc(db, 'segnalazioni', ids[i]), { order: i }); } catch(e) {}
      }
    }
  }

  function beginDrag(el, point) {
    if (!el || dragging) return;
    dragging = true;
    dragged = el;
    suppressNextClick = true;

    try { if (navigator.vibrate) navigator.vibrate(12); } catch(e) {}

    const rect = el.getBoundingClientRect();
    offsetX = point.x - rect.left;
    offsetY = point.y - rect.top;
    currentX = point.x;
    currentY = point.y;

    placeholder = document.createElement('div');
    placeholder.className = 'anomalia-placeholder';
    placeholder.style.height = rect.height + 'px';
    placeholder.style.marginBottom = getComputedStyle(el).marginBottom || '12px';
    el.parentNode.insertBefore(placeholder, el);

    document.body.appendChild(el);
    el.classList.add('touch-dragging-card');
    el.style.position = 'fixed';
    el.style.left = '0px';
    el.style.top = '0px';
    el.style.width = rect.width + 'px';
    el.style.height = rect.height + 'px';
    el.style.margin = '0';
    el.style.transition = 'none';
    document.body.classList.add('reordering-anomalie');
    requestDraggedPosition(point);
  }

  function movePlaceholder(y) {
    if (!placeholder) return;
    const siblings = Array.from(list.querySelectorAll('.anomalia-main')).filter(el => el !== dragged);
    let before = null;
    for (const child of siblings) {
      const r = child.getBoundingClientRect();
      const midpoint = r.top + r.height / 2;
      if (y < midpoint) { before = child; break; }
    }
    const currentNext = placeholder.nextElementSibling;
    if (before && currentNext !== before) {
      animateListMove(() => list.insertBefore(placeholder, before));
    } else if (!before && placeholder.parentNode && placeholder !== list.lastElementChild) {
      animateListMove(() => list.appendChild(placeholder));
    }
  }

  function onMove(e) {
    const point = getPoint(e);

    if (!dragging) {
      if (pressTimer && (Math.abs(point.x - startX) > 10 || Math.abs(point.y - startY) > 10)) {
        clearTimeout(pressTimer);
        pressTimer = null;
      }
      return;
    }

    e.preventDefault();
    requestDraggedPosition(point);
    movePlaceholder(point.y);

    const h = window.innerHeight || document.documentElement.clientHeight;
    if (point.y < 72) window.scrollBy(0, -12);
    else if (point.y > h - 72) window.scrollBy(0, 12);
  }

  function endDrag() {
    if (pressTimer) {
      clearTimeout(pressTimer);
      pressTimer = null;
    }
    if (!dragging) return;

    if (rafId) {
      cancelAnimationFrame(rafId);
      rafId = null;
    }

    if (placeholder && dragged) {
      animateListMove(() => {
        list.insertBefore(dragged, placeholder);
        placeholder.remove();
      });
    }
    resetCardStyle(dragged);
    document.body.classList.remove('reordering-anomalie');

    dragging = false;
    dragged = null;
    placeholder = null;
    persistOrder();

    setTimeout(() => { suppressNextClick = false; }, 300);
  }

  function onStart(e) {
    if (isControlTarget(e.target)) return;
    const el = e.target.closest && e.target.closest('.anomalia-main');
    if (!el || !list.contains(el)) return;

    const point = getPoint(e);
    startX = point.x;
    startY = point.y;
    clearTimeout(pressTimer);
    pressTimer = setTimeout(() => beginDrag(el, point), 330);
  }

  function onClickCapture(e) {
    if (suppressNextClick) {
      e.preventDefault();
      e.stopPropagation();
      suppressNextClick = false;
    }
  }

  const optsPassive = { passive: true };
  const optsActive = { passive: false };
  list.addEventListener('touchstart', onStart, optsPassive);
  document.addEventListener('touchmove', onMove, optsActive);
  document.addEventListener('touchend', endDrag, optsPassive);
  document.addEventListener('touchcancel', endDrag, optsPassive);
  list.addEventListener('click', onClickCapture, true);

  list.addEventListener('mousedown', onStart);
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', endDrag);

  cleanups.push(() => list.removeEventListener('touchstart', onStart, optsPassive));
  cleanups.push(() => document.removeEventListener('touchmove', onMove, optsActive));
  cleanups.push(() => document.removeEventListener('touchend', endDrag, optsPassive));
  cleanups.push(() => document.removeEventListener('touchcancel', endDrag, optsPassive));
  cleanups.push(() => list.removeEventListener('click', onClickCapture, true));
  cleanups.push(() => list.removeEventListener('mousedown', onStart));
  cleanups.push(() => document.removeEventListener('mousemove', onMove));
  cleanups.push(() => document.removeEventListener('mouseup', endDrag));

  list._touchReorderCleanup = function() {
    cleanups.forEach(fn => { try { fn(); } catch(e) {} });
  };
}


window.moveSeg = async function(id, direction) {
  if (!selectedBus) return;
  const segs = segnalazioni.filter(s => s.bus === selectedBus).slice().sort((a, b) => {
    const ao = (typeof a.order === 'number') ? a.order : 999999;
    const bo = (typeof b.order === 'number') ? b.order : 999999;
    if (ao !== bo) return ao - bo;
    const ad = a.createdAt ? new Date(a.createdAt).getTime() : 0;
    const bd = b.createdAt ? new Date(b.createdAt).getTime() : 0;
    return bd - ad;
  });
  const idx = segs.findIndex(s => s.id === id);
  if (idx < 0) return;
  const target = idx + direction;
  if (target < 0 || target >= segs.length) return;

  const movedId = segs[idx].id;
  const opened = new Set(openAnomaliaIds);
  opened.add(movedId);
  openAnomaliaIds = opened;

  const reordered = segs.slice();
  const [item] = reordered.splice(idx, 1);
  reordered.splice(target, 0, item);

  // Aggiornamento locale immediato per rendere lo spostamento visibile subito.
  reordered.forEach((seg, order) => {
    const local = segnalazioni.find(x => x.id === seg.id);
    if (local) local.order = order;
  });
  showBusDetail(selectedBus);

  // Salvataggio stabile su Firebase.
  try {
    await Promise.all(reordered.map((seg, order) => updateDoc(doc(db, 'segnalazioni', seg.id), { order })));
  } catch (e) {
    console.error('Errore salvataggio ordine anomalie', e);
    alert('Errore nel salvataggio del nuovo ordine. Riprova.');
  }
}

function renderPianoBusMatches(assignments) {
  const results = document.getElementById('pianoBusResults');
  const status = document.getElementById('pianoBusStatus');
  if (!results || !status) return;

  const segBus = new Set(segnalazioni.map(s => s.bus));
  const matches = assignments.filter(a => segBus.has(a.bus));
  if (!assignments.length) {
    status.textContent = 'Non sono riuscito a leggere matricole dalla foto. Prova con una foto più dritta e nitida.';
    results.classList.remove('open');
    results.innerHTML = '';
    return;
  }
  status.textContent = matches.length ? '' : 'Nessuna coincidenza trovata.';
  if (!matches.length) {
    results.classList.add('open');
    results.innerHTML = '<div class="piano-muted">Nessun autobus del piano risulta presente tra le segnalazioni aperte.</div>';
    return;
  }
  const rows = matches.map(a => {
    const count = segnalazioni.filter(s => s.bus === a.bus).length;
    return '<div class="piano-bus-row" onclick="selectBus(\'' + a.bus + '\')">'
      + '<div class="piano-driver">' + a.driver + '</div>'
      + '<div class="piano-code">' + a.bus + '</div>'
      + '</div>';
  }).join('');
  results.classList.add('open');
  results.innerHTML = '<div class="piano-bus-results-title">Autobus attenzionati</div>' + rows;
}

window.analizzaPianoBus = async function(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  const status = document.getElementById('pianoBusStatus');
  const results = document.getElementById('pianoBusResults');
  if (results) { results.classList.remove('open'); results.innerHTML = ''; }
  if (!window.Tesseract) {
    status.textContent = 'OCR non disponibile. Controlla la connessione e riprova.';
    return;
  }
  try {
    status.textContent = 'Lettura foto in corso... attendi qualche secondo.';
    const { data } = await Tesseract.recognize(file, 'ita+eng', {
      logger: m => {
        if (m.status === 'recognizing text' && status) {
          status.textContent = 'Lettura foto... ' + Math.round((m.progress || 0) * 100) + '%';
        }
      }
    });
    const assignments = estraiAssegnazioniDaOCR(data.text);
    renderPianoBusMatches(assignments);
  } catch (err) {
    console.error(err);
    status.textContent = 'Errore durante la lettura della foto. Prova con un’immagine più nitida.';
  }
}

window.pulisciPianoBus = function() {
  const status = document.getElementById('pianoBusStatus');
  const results = document.getElementById('pianoBusResults');
  const input = document.getElementById('pianoBusInput');
  if (input) input.value = '';
  if (status) status.textContent = '';
  if (results) { results.classList.remove('open'); results.innerHTML = ''; }
}

function showToast(msg) {
  // Notifiche verdi disattivate per scelta dell'utente.
}
window.showToast = showToast;
